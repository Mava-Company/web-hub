<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>الرسائل</title>

  <link rel="stylesheet"
  href="assets/css/admin.css"/>

  <link rel="stylesheet"
  href="assets/css/messages.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

 
  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-logo">

      <h2 id="adminSiteName"></h2>

    </div>

    <nav class="sidebar-nav">

      <a href="index.html"
      class="active">

        <i class="fa-solid fa-chart-line"></i>

        <span>
          لوحة التحكم
        </span>

      </a>

      <a href="services.html">

        <i class="fa-solid fa-layer-group"></i>

        <span>
          الخدمات
        </span>

      </a>

      <a href="orders.html">

        <i class="fa-solid fa-cart-shopping"></i>

        <span>
          الطلبات
        </span>

      </a>

      <a href="users.html">

        <i class="fa-solid fa-users"></i>

        <span>
          المستخدمين
        </span>

      </a>

      <a href="portfolio.html">

        <i class="fa-solid fa-image"></i>

        <span>
          معرض الأعمال
        </span>

      </a>

      <a href="messages.html">

        <i class="fa-solid fa-envelope"></i>

        <span>
          الرسائل
        </span>

      </a>


      <button id="logoutBtn">

        <i class="fa-solid fa-right-from-bracket"></i>

        <span>
          تسجيل الخروج
        </span>

      </button>

    </nav>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">

      <div class="topbar-left">

        <h1>
          الرسائل الواردة
        </h1>

      </div>

    </header>

    <!-- FILTERS -->

    <section class="filters-section">

      <div class="filters-container">

        <input
        type="text"
        id="searchMessage"
        placeholder="بحث عن رسالة"/>

        <select id="messageStatusFilter">

          <option value="">
            جميع الرسائل
          </option>

          <option value="read">
            مقروءة
          </option>

          <option value="unread">
            غير مقروءة
          </option>

        </select>

      </div>

    </section>

    <!-- TABLE -->

    <section class="table-section">

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>
                الاسم
              </th>

              <th>
                البريد الإلكتروني
              </th>

              <th>
                العنوان
              </th>

              <th>
                التاريخ
              </th>

              <th>
                الحالة
              </th>

              <th>
                الإجراءات
              </th>

            </tr>

          </thead>

          <tbody id="messagesTable">

            <!-- Dynamic Messages -->

          </tbody>

        </table>

      </div>

    </section>

  </main>

  <!-- MESSAGE MODAL -->

  <div class="modal hidden"
  id="messageModal">

    <div class="modal-content large">

      <button class="close-modal"
      id="closeMessageModal">

        <i class="fa-solid fa-xmark"></i>

      </button>

      <h2>
        تفاصيل الرسالة
      </h2>

      <div class="message-details">

        <div class="details-grid">

          <div class="detail-box">

            <span>
              الاسم
            </span>

            <strong id="modalSenderName"></strong>

          </div>

          <div class="detail-box">

            <span>
              البريد الإلكتروني
            </span>

            <strong id="modalSenderEmail"></strong>

          </div>

          <div class="detail-box">

            <span>
              عنوان الرسالة
            </span>

            <strong id="modalMessageSubject"></strong>

          </div>

          <div class="detail-box">

            <span>
              التاريخ
            </span>

            <strong id="modalMessageDate"></strong>

          </div>

        </div>

        <div class="message-content">

          <h3>
            محتوى الرسالة
          </h3>

          <p id="modalMessageContent"></p>

        </div>

        <div class="modal-actions">

          <button id="markAsRead"
          class="btn primary-btn">

            تعليم كمقروءة

          </button>

          <button id="deleteMessage"
          class="btn danger-btn">

            حذف الرسالة

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- LOADING -->


  <div class="loading-overlay"
  id="loadingOverlay">

    <div class="loader"></div>

  </div>
  <script type="module"
  src="./assets/js/messages.js"></script>

</body>

</html>
