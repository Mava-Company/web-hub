<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>إدارة الخدمات</title>

  <link rel="stylesheet"
  href="./assets/css/admin.css"/>

  <link rel="stylesheet"
  href="./assets/css/services.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

 
  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div class="sidebar-logo">

      <h2 id="adminSiteName"></h2>

    </div>

    <nav class="sidebar-nav">

      <a href="index.html"
      class="active">

        <i class="fa-solid fa-chart-line"></i>

        <span>
          لوحة التحكم
        </span>

      </a>

      <a href="services.html">

        <i class="fa-solid fa-layer-group"></i>

        <span>
          الخدمات
        </span>

      </a>

      <a href="orders.html">

        <i class="fa-solid fa-cart-shopping"></i>

        <span>
          الطلبات
        </span>

      </a>

      <a href="users.html">

        <i class="fa-solid fa-users"></i>

        <span>
          المستخدمين
        </span>

      </a>

      <a href="portfolio.html">

        <i class="fa-solid fa-image"></i>

        <span>
          معرض الأعمال
        </span>

      </a>

      <a href="messages.html">

        <i class="fa-solid fa-envelope"></i>

        <span>
          الرسائل
        </span>

      </a>


      <button id="logoutBtn">

        <i class="fa-solid fa-right-from-bracket"></i>

        <span>
          تسجيل الخروج
        </span>

      </button>

    </nav>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">

      <div class="topbar-left">

        <button class="menu-btn" id="toggleSidebar">
  <i class="fa-solid fa-bars"></i>
</button>
        <h1>
          إدارة الخدمات
        </h1>

      </div>

      <div class="topbar-right">

        <a href="add-service.html"
        class="btn primary-btn">

          إضافة خدمة

        </a>

      </div>

    </header>

    <!-- FILTERS -->

    <section class="filters-section">

      <div class="filters-container">

        <input
        type="text"
        id="searchService"
        placeholder="بحث عن خدمة"/>

        <select id="categoryFilter">

          <option value="">
            جميع التصنيفات
          </option>

        </select>

      </div>

    </section>

    <!-- SERVICES TABLE -->

    <section class="table-section">

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>
                الصورة
              </th>

              <th>
                اسم الخدمة
              </th>

              <th>
                التصنيف
              </th>

              <th>
                السعر
              </th>

              <th>
                الحالة
              </th>

              <th>
                التاريخ
              </th>

              <th>
                الإجراءات
              </th>

            </tr>

          </thead>

          <tbody id="servicesTable">

            <!-- Dynamic Services -->

          </tbody>

        </table>

      </div>

    </section>

  </main>

  <!-- DELETE MODAL -->

  <div class="modal hidden"
  id="deleteModal">

    <div class="modal-content">

      <h3>
        حذف الخدمة
      </h3>

      <p>
        هل أنت متأكد من حذف الخدمة؟
      </p>

      <div class="modal-actions">

        <button id="confirmDelete"
        class="btn danger-btn">

          حذف

        </button>

        <button id="cancelDelete"
        class="btn secondary-btn">

          إلغاء

        </button>

      </div>

    </div>

  </div>

  <!-- LOADING -->


  <div class="loading-overlay"
  id="loadingOverlay">

    <div class="loader"></div>

  </div>
  <script>
document.addEventListener("DOMContentLoaded", () => {

  const sidebar = document.querySelector(".sidebar");
  const btn = document.getElementById("toggleSidebar");

  if (!sidebar || !btn) return;

  btn.addEventListener("click", () => {
    sidebar.classList.toggle("active");
  });

});
</script>
  <script type="module" src="assets/js/auth-ui.js"></script>
  <script type="module"
  src="./assets/js/services.js"></script>

</body>

</html>
