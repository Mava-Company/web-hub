<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>تواصل معنا</title>

  <link rel="stylesheet"
  href="assets/css/contact.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
  <img src="assets/images/logo.jpeg" alt="Logo">
  <a href="index.html">ASH DESIGN</a>
</div>

    <nav class="navbar">

      <a href="index.html">الرئيسية</a>
      <a href="services.html">الخدمات</a>
      <a href="portfolio.html">معرض الأعمال</a>
      <a href="track-order.html">تتبع الطلب</a>
      <a href="about.html" target="_blank">من نحن</a>

      <a href="contact.html" >تواصل معنا</a>
     <div id="authLinks">
  <a href="login.html" id="loginLink">تسجيل الدخول</a>
  <a href="register.html" id="registerLink">إنشاء الحساب</a>

  <a href="profile.html" id="profileLink" style="display:none;">
    البروفايل
  </a>

  <a href="login.html" id="logoutLink" style="display:none;">
    تسجيل الخروج
  </a>
</div>
    </nav>

    <div class="menu-btn">
      <i class="fa-solid fa-bars"></i>
    </div>

  </header>



  <!-- HERO -->

  <section class="page-hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

      <h1 id="contactHeroTitle"></h1>

      <p id="contactHeroDescription"></p>

    </div>

  </section>

  <!-- CONTACT SECTION -->

  <section class="contact-section section">

    <div class="contact-container">

      <!-- INFO -->

      <div class="contact-info">

        <div class="info-box">

          <i class="fa-solid fa-phone"></i>

          <div>

            <h3>
              الهاتف
            </h3>

            <p id="contactPhone"></p>

          </div>

        </div>

        <div class="info-box">

          <i class="fa-solid fa-envelope"></i>

          <div>

            <h3>
              البريد الإلكتروني
            </h3>

            <p id="contactEmail"></p>

          </div>

        </div>

        <div class="info-box">

          <i class="fa-solid fa-location-dot"></i>

          <div>

            <h3>
              العنوان
            </h3>

            <p id="contactAddress"></p>

          </div>

        </div>

        <div class="info-box">

          <i class="fa-brands fa-whatsapp"></i>

          <div>

            <h3>
              واتساب
            </h3>

            <a href="#"
            id="contactWhatsapp">

              تواصل الآن

            </a>

          </div>

        </div>

      </div>

      <!-- FORM -->

      <div class="contact-form">

        <form id="messageForm">

          <div class="form-group">

            <input
            type="text"
            id="fullName"
            placeholder="الاسم الكامل"
            required/>

          </div>

          <div class="form-group">

            <input
            type="email"
            id="email"
            placeholder="البريد الإلكتروني"
            required/>

          </div>

          <div class="form-group">

            <input
            type="text"
            id="subject"
            placeholder="عنوان الرسالة"
            required/>

          </div>

          <div class="form-group">

            <textarea
            id="message"
            placeholder="اكتب رسالتك"
            required></textarea>

          </div>

          <button type="submit"
          class="btn primary-btn">

            إرسال الرسالة

          </button>

        </form>

      </div>

    </div>

  </section>

  <!-- MAP -->

  <section class="map-section">

    <div id="mapContainer">

      <!-- Dynamic Map -->

    </div>

  </section>

  

  <!-- FOOTER -->

  <footer class="footer">

    <div class="footer-container">

      <div class="footer-box">

        <h2 id="footerSiteName"></h2>

        <p id="footerDescription"></p>

      </div>

      <div class="footer-box">

        <h3>
          روابط
        </h3>

        <a href="index.html">
          الرئيسية
        </a>

        <a href="services.html">
          الخدمات
        </a>

        <a href="about.html">
          من نحن
        </a>

        <a href="contact.html">
          تواصل معنا
        </a>

      </div>

      <div class="footer-box">

        <h3>
          تواصل
        </h3>

        <a href="#"
        id="footerWhatsapp">

          واتساب

        </a>

        <a href="#"
        id="footerEmail">

          البريد الإلكتروني

        </a>

      </div>

    </div>

    <div class="footer-bottom">

      <p id="copyrightText"></p>

    </div>

  </footer>

  <!-- FLOATING WHATSAPP -->

  <a href="#"
  class="floating-whatsapp"
  id="floatingWhatsapp">

    <i class="fa-brands fa-whatsapp"></i>

  </a>

  <!-- LOADING 

  <div class="loading-overlay"
  id="loadingOverlay">

    <div class="loader"></div>

  </div>
-->

<script type="module" src="assets/js/auth-ui.js"></script>
  <script type="module"
  src="assets/js/contact.js"></script>

</body>

</html>
