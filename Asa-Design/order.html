  <!-- FORM -->
  <form id="orderForm">

    <input id="phone" placeholder="رقم الهاتف" required />
    <input id="email" placeholder="البريد الإلكتروني" />
    <textarea id="address" placeholder="العنوان" required></textarea>

    <button type="submit">
      تأكيد الطلب
    </button>

  </form>

  <!-- RESULT -->
  <div id="resultBox" style="display:none;">

    <h2 id="orderCode"></h2>

    <button id="copyCodeBtn">نسخ الكود</button>

    <a id="whatsappBtn" target="_blank">
      تواصل على واتساب
    </a>

  </div>
  <script>
const menuBtn = document.querySelector(".menu-btn");
const navbar = document.querySelector(".navbar");

  navbar.classList.toggle("active");
};
</script>
