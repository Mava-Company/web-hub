<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>إنشاء حساب</title>

  <link rel="stylesheet"
  href="assets/css/register.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

  <section class="auth-section">

    <div class="auth-container">

      <!-- LEFT -->

      <div class="auth-image">

        <div class="overlay"></div>

        <div class="image-content">

          <h1 id="registerHeroTitle"></h1>

          <p id="registerHeroDescription"></p>

        </div>

      </div>

      <!-- RIGHT -->

      <div class="auth-form-container">

        <div class="form-header">

          <h2>
            إنشاء حساب
          </h2>

          <p>
            قم بإنشاء حساب جديد
          </p>

        </div>

        <form id="registerForm">

          <div class="form-group">

            <label>
              الاسم الكامل
            </label>

            <input
            type="text"
            id="fullName"
            required/>

          </div>

          <div class="form-group">

            <label>
              البريد الإلكتروني
            </label>

            <input
            type="email"
            id="registerEmail"
            required/>

          </div>

          <div class="form-group">

            <label>
              رقم الهاتف
            </label>

            <input
            type="text"
            id="phoneNumber"
            required/>

          </div>

          <div class="form-group">

            <label>
              كلمة المرور
            </label>

            <div class="password-box">

              <input
              type="password"
              id="registerPassword"
              required/>

              <button type="button"
              id="toggleRegisterPassword">

                <i class="fa-regular fa-eye"></i>

              </button>

            </div>

          </div>

          <div class="form-group">

            <label>
              تأكيد كلمة المرور
            </label>

            <div class="password-box">

              <input
              type="password"
              id="confirmPassword"
              required/>

              <button type="button"
              id="toggleConfirmPassword">

                <i class="fa-regular fa-eye"></i>

              </button>

            </div>

          </div>

          <button type="submit"
          class="btn primary-btn">

            إنشاء الحساب

          </button>

        </form>

        <div class="auth-footer">

          <p>

            لديك حساب بالفعل؟

            <a href="login.html">

              تسجيل الدخول

            </a>

          </p>

        </div>

      </div>

    </div>

  </section>

  <!-- LOADING 

  <div class="loading-overlay"
  id="loadingOverlay">

    <div class="loader"></div>

  </div>
-->



<script type="module" src="assets/js/firebase-config.js"></script>
  <script type="module"
  src="assets/js/register.js"></script>

</body>

</html>
