<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>تفاصيل الخدمة</title>

  <link rel="stylesheet"
  href="assets/css/service-details.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  

</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
  <img src="assets/images/logo.jpeg" alt="Logo">
  <a href="index.html">ASH DESIGN</a>
</div>

    <nav class="navbar">

      <a href="index.html">الرئيسية</a>
      <a href="services.html">الخدمات</a>
      <a href="portfolio.html">معرض الأعمال</a>
      <a href="track-order.html">تتبع الطلب</a>
      <a href="about.html" target="_blank">من نحن</a>

      <a href="contact.html" >تواصل معنا</a>
     <div id="authLinks">
  <a href="login.html" id="loginLink">تسجيل الدخول</a>
  <a href="register.html" id="registerLink">إنشاء الحساب</a>

  <a href="profile.html" id="profileLink" style="display:none;">
    البروفايل
  </a>

  <a href="login.html" id="logoutLink" style="display:none;">
    تسجيل الخروج
  </a>
</div>
    </nav>

    <div class="menu-btn">
      <i class="fa-solid fa-bars"></i>
    </div>

  </header>

  

  <section class="service-hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

      <h1 id="serviceTitle"></h1>

      <p id="serviceShortDescription"></p>

    </div>

  </section>

  <!-- SERVICE DETAILS -->

  <section class="service-details section">

    <div class="details-container">

      <!-- GALLERY -->

    <div class="service-media-slider">

  <!-- الصورة الرئيسية -->

  <div class="service-media-slider" id="serviceMediaSlider">

  <button class="slider-btn prev" id="prevMedia">
    <i class="fa-solid fa-chevron-right"></i>
  </button>

  <button class="slider-btn next" id="nextMedia">
    <i class="fa-solid fa-chevron-left"></i>
  </button>

</div>
      <!-- INFO -->

      <div class="service-info">

        <h2 id="serviceMainTitle"></h2>

        <p id="serviceFullDescription"></p>

        <div class="service-meta">

          <div class="meta-box">

            <span>السعر</span>

            <strong id="servicePrice"></strong>

          </div>

        

        <div class="service-actions">
          <div id="serviceStatus"></div>

          <a id="orderBtn" class="btn primary-btn">
  اطلب الخدمة
</a>

        </div>

      </div>

    </div>

  </section>

 




  <!-- CONTACT CTA -->

  <section class="contact-cta">

    <div class="cta-content">

      <h2 id="ctaTitle"></h2>

      <p id="ctaDescription"></p>

      <a href="#"
      id="ctaWhatsappBtn"
      class="btn primary-btn">

        تواصل الآن

      </a>

    </div>

  </section>

  <!-- FOOTER -->

  <footer class="footer">

    <div class="footer-container">

      <div class="footer-box">

        <h2 id="footerSiteName"></h2>

        <p id="footerDescription"></p>

      </div>

      <div class="footer-box">

        <h3>
          روابط
        </h3>

        <a href="index.html">
          الرئيسية
        </a>

        <a href="services.html">
          الخدمات
        </a>

        <a href="about.html">
          من نحن
        </a>

        <a href="contact.html">
          تواصل معنا
        </a>

      </div>

      <div class="footer-box">

        <h3>
          تواصل
        </h3>

        <a href="#"
        id="footerWhatsapp">

          واتساب

        </a>

        <a href="#"
        id="footerEmail">

          البريد الإلكتروني

        </a>

      </div>

    </div>

    <div class="footer-bottom">

      <p id="copyrightText"></p>

    </div>

  </footer>

  <!-- FLOATING WHATSAPP -->

  <a href="#"
  class="floating-whatsapp"
  id="floatingWhatsapp">

    <i class="fa-brands fa-whatsapp"></i>

  </a>

  <!-- LOADING -->

  <div class="loading-overlay"
  id="loadingOverlay">

    <div class="loader"></div>

  </div>
<script type="module" src="assets/js/auth-ui.js"></script>
  <script type="module"
  src="assets/js/service-details.js"></script>

</body>

</html>
