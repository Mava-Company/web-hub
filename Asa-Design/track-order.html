    </div>

  </header>

  <!-- HERO -->

  <section class="page-hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

      <h1 id="trackHeroTitle"></h1>

      <p id="trackHeroDescription"></p>

    </div>

  </section>

  <!-- TRACK SECTION -->

  <section class="track-section section">

    <div class="track-container">

      <!-- SEARCH -->

      <div class="track-search">

        <input
        type="text"
        id="orderNumberInput"
        placeholder="أدخل رقم الطلب"/>

        <button id="trackOrderBtn"
        class="btn primary-btn">

          تتبع الطلب

        </button>

      </div>

      <!-- RESULT -->

      <div class="track-result hidden"
      id="trackResult">

        <div class="result-header">

          <h2>
            تفاصيل الطلب
          </h2>

          <div class="order-number-box">

            <span id="resultOrderNumber"></span>

            <button id="copyOrderNumber">

              <i class="fa-regular fa-copy"></i>

            </button>

          </div>

        </div>

        <!-- INFO -->

        <div class="result-info">

          <div class="info-box">

            <span>
              اسم الخدمة
            </span>

            <strong id="resultService"></strong>

          </div>

          <div class="info-box">

            <span>
              الحالة
            </span>

            <strong id="resultStatus"></strong>

          </div>

          <div class="info-box">

            <span>
              تاريخ الطلب
            </span>

            <strong id="resultDate"></strong>

          </div>

         

        </div>

        <!-- TIMELINE -->

        <div class="timeline-container"
        id="timelineContainer">

          <!-- Dynamic Timeline -->

        </div>

        <!-- NOTES -->

       

      </div>

      <!-- EMPTY -->

      <div class="empty-result hidden"
      id="emptyResult">

        <i class="fa-solid fa-circle-exclamation"></i>

        <h3>
          لم يتم العثور على الطلب
        </h3>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer class="footer">

    <div class="footer-container">

      <div class="footer-box">

        <h2 id="footerSiteName"></h2>

        <p id="footerDescription"></p>

      </div>

      <div class="footer-box">

        <h3>
          روابط
        </h3>

        <a href="index.html">
          الرئيسية

        id="footerEmail">

          البريد الإلكتروني

        </a>

      </div>

    </div>

    <div class="footer-bottom">

      <p id="copyrightText"></p>

    </div>

  </footer>
