<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>تفاصيل الكيكة</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#f5f5f5;
      padding:30px;
    }

    .cake-details{

      max-width:700px;
      margin:auto;
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);

    }

    .cake-details img{

      width:100%;
      height:350px;
      object-fit:cover;

    }

    .cake-content{

      padding:25px;

    }

    .cake-content h1{

      margin-bottom:15px;
      color:#222;

    }

    .cake-content p{

      margin-bottom:12px;
      color:#555;
      line-height:1.7;

    }

    .price{

      font-size:22px;
      font-weight:bold;
      color:#e91e63;

    }

    .order-form{

      margin-top:30px;

    }

    .order-form input,
    .order-form textarea{

      width:100%;
      padding:14px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;

    }

    .order-btn{

      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#111827;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;

    }

    .order-btn:hover{

      background:#e91e63;

    }

  </style>

</head>

<body>

  <div class="cake-details">

    <img id="cakeImage" />

    <div class="cake-content">

      <h1 id="cakeName"></h1>

      <p id="cakeDescription"></p>

      <p class="price" id="cakePrice"></p>

      <p id="cakeCategory"></p>

      <!-- Order Form -->

      <div class="order-form">

        <h2 style="margin-bottom:20px;">
          طلب الكيكة 🎂
        </h2>

        <input
          type="text"
          id="customerName"
          placeholder="اسمك"
        />

        <input
          type="tel"
          id="customerPhone"
          placeholder="رقم الهاتف"
        />

        <textarea
          id="customerNote"
          placeholder="ملاحظات الطلب"
        ></textarea>

        <button class="order-btn" id="sendOrderBtn">
          إرسال الطلب 🚀
        </button>

      </div>

    </div>

  </div>

  <!-- Firebase -->

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>

    const firebaseConfig = {

      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",

    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

  </script>

  <script>

    // جلب ID الكيكة من الرابط

    const params = new URLSearchParams(window.location.search);

    const cakeId = params.get("cakeId");

    // العناصر

    const cakeImage = document.getElementById("cakeImage");
    const cakeName = document.getElementById("cakeName");
    const cakeDescription = document.getElementById("cakeDescription");
    const cakePrice = document.getElementById("cakePrice");
    const cakeCategory = document.getElementById("cakeCategory");

    // تحميل بيانات الكيكة

    db.collection("cakes")
      .doc(cakeId)
      .get()
      .then(doc => {

        if(doc.exists){

          const cake = doc.data();

          cakeImage.src = cake.image;
          cakeName.textContent = cake.name;
          cakeDescription.textContent = cake.description;
          cakePrice.textContent = "💰 " + cake.price;
          cakeCategory.textContent = "📂 " + cake.category;

        }

      });

    // إرسال الطلب

    document
      .getElementById("sendOrderBtn")
      .addEventListener("click", () => {

        const customerName =
          document.getElementById("customerName").value;

        const customerPhone =
          document.getElementById("customerPhone").value;

        const customerNote =
          document.getElementById("customerNote").value;

        if(
          !customerName ||
          !customerPhone
        ){

          alert("يرجى ملء البيانات");

          return;

        }

        db.collection("orders")
          .add({

            cakeId: cakeId,

            customerName,
            customerPhone,
            customerNote,

            createdAt: new Date()

          })

          .then(() => {

            alert("تم إرسال الطلب بنجاح 🎉");

            window.location.href = "index.html";

          });

      });

  </script>

</body>

</html>
