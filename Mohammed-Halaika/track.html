<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>تتبع الطلب</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  
  <header class="navbar">

    <div class="logo">
      🍰 Sweet Cake
    </div>

    <nav class="nav-links">

      <a href="index.html">
        الرئيسية
      </a>

      <a href="order.html">
        اطلب الآن
      </a>

      <a href="track.html">
        تتبع الطلب
      </a>

      <a href="about.html" target="_blank">
من نحن
      </a>
     

    </nav>

  </header>
  <!-- Track Section -->
  <section class="track-section">

    <h1>تتبع طلب الكيك 🎂</h1>

    <div class="track-box">

      <input
        type="text"
        id="trackInput"
        placeholder="أدخل رقم الطلب"
      >

      <button id="trackBtn">
        تتبع الطلب
      </button>

    </div>

    <!-- Result -->
    <div id="trackResult" class="track-result">

      <!-- تظهر بيانات الطلب هنا -->

    </div>

  </section>

  <!-- ========================= -->
  <!-- ADMIN MODAL -->
  <!-- ========================= -->

  <div id="adminLogin" class="modal">

    <div class="modal-content">

      <span
        class="close-btn"
        onclick="closeAdminModal()"
      >
        &times;
      </span>

      <h2>
        🔐 دخول الأدمن
      </h2>

      <input
        type="password"
        id="adminPassword"
        placeholder="كلمة المرور"
      >

      <button id="loginBtn">
        دخول
      </button>

      <p id="loginError"></p>

    </div>

  </div>
 
  <script src="js/track.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

</body>
</html>
