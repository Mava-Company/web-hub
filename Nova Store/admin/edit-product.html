<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <title>Редакция на продукт</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      margin-bottom: 6px;
      color: #444;
    }

    input, textarea, select {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .checkboxes {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .checkboxes label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #0b5ed7;
    }


    .toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #28a745;
  color: white;
  padding: 14px 18px;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}
  </style>
</head>

<body>

  <div class="container">

    <h2>✏️ Редакция на продукт</h2>

    <form id="productForm">

      <div class="grid">

        <div class="field">
          <label>Име на продукта</label>
          <input id="title" type="text">
        </div>

        <div class="field">
          <label>Категория</label>
          <select id="category">
            <option value="">Избери категория</option>
            <option value="electronics">Електроника</option>
            <option value="fashion">Мода</option>
            <option value="home">Дом</option>
            <option value="sports">Спорт</option>
          </select>
        </div>

        <div class="field">
          <label>Цена</label>
          <input id="price" type="number">
        </div>

        <div class="field">
          <label>Стара цена</label>
          <input id="oldPrice" type="number">
        </div>

        <div class="field">
          <label>Количество</label>
          <input id="stock" type="number">
        </div>

        <div class="field">
          <label>Гаранция (месеци)</label>
          <input id="warranty" type="number">
        </div>

        <div class="field full">
          <label>Описание</label>
          <textarea id="description"></textarea>
        </div>

        <div class="field">
          <label>Тип</label>
          <input id="type" type="text">
        </div>

        <div class="field">
          <label>Статус</label>
          <select id="status">
            <option value="active">Активен</option>
            <option value="inactive">Неактивен</option>
            <option value="draft">Чернова</option>
          </select>
        </div>

        <div class="field">
          <label>Състояние</label>
          <select id="condition">
            <option value="new">Ново</option>
            <option value="used">Използвано</option>
            <option value="refurbished">Рефабрикувано</option>
          </select>
        </div>

        <div class="field">
          <label>Снимки</label>
          <input id="images" type="file" multiple>
        </div>

      </div>

      <div class="checkboxes">

        <label>
          <input type="checkbox" id="featured">
          Препоръчан
        </label>

        <label>
          <input type="checkbox" id="bestSeller">
          Най-продаван
        </label>

        <label>
          <input type="checkbox" id="onSale">
          На промоция
        </label>

      </div>

      <button class="btn" type="submit">
        💾 Запази промените
      </button>

    </form>

  </div>

<div id="toast" class="toast"></div>
  <script type="module" src="../js/edit-product.js"></script>

</body>

</html>
