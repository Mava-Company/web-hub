<!-- admin/products.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Продукти</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
    }

    .sidebar{
      width:280px;
      height:100vh;
      background:#111827;
      padding:30px;
      position:fixed;
      left:0;
      top:0;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:50px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-bottom:10px;
      border-radius:12px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    .main{
      margin-left:280px;
      width:100%;
      padding:40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
    }

    .topbar h1{
      font-size:40px;
    }

    .add-btn{
      padding:14px 25px;
      background:#8b5cf6;
      color:white;
      text-decoration:none;
      border-radius:12px;
      transition:0.3s;
    }

    .add-btn:hover{
      background:#7c3aed;
    }

    .products-table{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:18px;
      text-align:left;
      border-bottom:1px solid #334155;
    }

    table th{
      color:#94a3b8;
    }

    .product-info{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .product-info img{
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:12px;
    }

    .status{
      padding:8px 15px;
      border-radius:10px;
      font-size:14px;
    }

    .available{
      background:#22c55e;
    }

    .out{
      background:#ef4444;
    }

    .actions{
      display:flex;
      gap:10px;
    }

    .edit-btn,
    .delete-btn{
      border:none;
      padding:10px 15px;
      border-radius:10px;
      color:white;
      cursor:pointer;
    }

    .edit-btn{
      background:#3b82f6;
    }

    .delete-btn{
      background:#ef4444;
    }

  </style>
</head>

<body>

<div class="sidebar">

  <div class="logo">Admin</div>

  <a href="dashboard.html">Контролен панел</a>
  <a href="add-product.html">Добави продукт</a>
  <a href="products.html">Продукти</a>
  <a href="orders.html">Поръчки</a>
  <a href="users.html">Потребители</a>

</div>

<div class="main">

  <div class="topbar">

    <h1>Продукти</h1>

    <a href="add-product.html" class="add-btn">
      + Добави продукт
    </a>

  </div>

  <div class="products-table">

    <table>

      <thead>

        <tr>
          <th>Продукт</th>
          <th>Категория</th>
          <th>Цена</th>
          <th>Количество</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>

      </thead>

     <tbody id="productsTable"></tbody>
    </table>

  </div>

</div>
<script type="module" src="../js/admin-products.js"></script>
</body>
</html>
