<!-- profile.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профил</title>

  <style>
 *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}

.profile-container{
  max-width:1100px;
  margin:40px auto;
  padding:20px;
}

.profile-card{
  background:white;
  padding:35px;
  border-radius:25px;
  box-shadow:0 5px 25px rgba(0,0,0,0.1);
}

.top{
  display:flex;
  align-items:center;
  gap:25px;
}

.avatar-box{
  position:relative;
}

.avatar{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #111;
}

.upload-btn{
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:white;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.top h2{
  font-size:30px;
}

.top p{
  color:gray;
  margin-top:8px;
}

.info-grid{
  margin-top:35px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.info-box{
  background:#fafafa;
  padding:20px;
  border-radius:18px;
}

.info-box span{
  color:gray;
  font-size:14px;
}

.info-box h3{
  margin-top:10px;
}

.actions{
  margin-top:30px;
  display:flex;
  gap:15px;
}

button{
  border:none;
  padding:14px 22px;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
}

#editBtn{
  background:#111;
  color:white;
}

#logoutBtn{
  background:#ff3b30;
  color:white;
}

.edit-box{
  display:none;
  margin-top:30px;
}

.edit-box input{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
}

#saveProfileBtn{
  margin-top:20px;
  width:100%;
  background:#111;
  color:white;
}
.orders-section{
  margin-top:40px;
}

.order-card{
  background:white;
  margin-top:15px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.order-card h3{
  margin-bottom:10px;
}

.order-status{
  color:green;
  font-weight:bold;
}
  </style>
</head>


<body>

<header>

  <div class="logo">SmartStore</div>

  <nav>

    <a href="index.html">Начало</a>

    <a href="products.html">Продукти</a>

    <a href="cart.html">Количка</a>

    <a href="track-order.html">Проследяване</a>

  </nav>

</header>


<div class="profile-container">


  <div class="profile-card">


    <div class="top">

      <div class="avatar-box">

        <img
          src="https://i.imgur.com/HeIi0wU.png"
          id="avatar"
          class="avatar"
        >

        <label class="upload-btn">

          Смени снимка

          <input type="file" id="avatarInput" hidden>

        </label>

      </div>


      <div>

        <h2 id="name">Loading...</h2>

        <p id="email"></p>

      </div>

    </div>



    <div class="info-grid">

      <div class="info-box">

        <span>Телефон</span>

        <h3 id="phone">-</h3>

      </div>


      <div class="info-box">

        <span>Статус</span>

        <h3>Клиент</h3>

      </div>

    </div>


    <div class="actions">

      <button id="editBtn">

        Редактирай профил

      </button>

      <button id="logoutBtn">

        Изход

      </button>

    </div>



    <!-- Edit Box -->


    <div class="edit-box" id="editBox">

      <h2>Редактиране</h2>

      <input
        type="text"
        id="editName"
        placeholder="Име"
      >

      <input
        type="text"
        id="editPhone"
        placeholder="Телефон"
      >

      <button id="saveProfileBtn">

        Запази

      </button>

    </div>


  </div>


</div>

<div class="orders-section">

  <h2>Моите поръчки</h2>

  <div id="ordersList"></div>

</div>

<script type="module" src="./js/profile.js"></script>

</body>
</html>
