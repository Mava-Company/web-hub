<!-- admin/add-product.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добави продукт</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
    }

    /* =========================
       SIDEBAR
    ========================== */

    .sidebar{
      width:260px;
      background:#111827;
      padding:25px 18px;
      position:fixed;
      left:0;
      top:0;
      height:100vh;
      overflow-y:auto;
      z-index:1000;
      transition:0.3s;
    }

    .logo{
      font-size:28px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:40px;
      text-align:center;
    }

    .sidebar nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:14px 16px;
      border-radius:12px;
      transition:0.3s;
      font-size:15px;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    /* =========================
       MAIN CONTENT
    ========================== */

    .main{
      margin-left:260px;
      width:100%;
      padding:40px;
      transition:0.3s;
    }

    .title{
      font-size:36px;
      margin-bottom:35px;
      line-height:1.3;
    }

    .form-container{
      background:#1e293b;
      padding:35px;
      border-radius:22px;
      width:100%;
      max-width:1000px;
    }

    .form-group{
      margin-bottom:24px;
    }

    .form-group label{
      display:block;
      margin-bottom:10px;
      color:#cbd5e1;
      font-size:15px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      font-size:16px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus{
      border:1px solid #8b5cf6;
    }

    textarea{
      min-height:140px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .checkboxes{
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      margin-top:10px;
    }

    .checkboxes label{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      cursor:pointer;
    }

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#8b5cf6;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      margin-top:20px;
      font-weight:bold;
    }

    .submit-btn:hover{
      background:#7c3aed;
    }

    /* =========================
       TOAST
    ========================== */

    .toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#28a745;
      color:white;
      padding:14px 18px;
      border-radius:8px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      font-size:14px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s ease;
      z-index:9999;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    /* =========================
       MOBILE MENU BUTTON
    ========================== */

    .menu-btn{
      display:none;
      position:fixed;
      top:15px;
      left:15px;
      z-index:2000;
      background:#8b5cf6;
      border:none;
      color:white;
      width:48px;
      height:48px;
      border-radius:12px;
      font-size:22px;
      cursor:pointer;
    }

    /* =========================
       OVERLAY
    ========================== */

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      opacity:0;
      visibility:hidden;
      transition:0.3s;
      z-index:900;
    }

    .overlay.show{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:992px){

      .main{
        padding:30px 20px;
      }

      .form-container{
        padding:25px;
      }

    }

    @media(max-width:768px){

      body{
        display:block;
      }

      .menu-btn{
        display:flex;
        align-items:center;
        justify-content:center;
      }

      .sidebar{
        left:-100%;
        width:260px;
      }

      .sidebar.active{
        left:0;
      }

      .main{
        margin-left:0;
        width:100%;
        padding:85px 16px 30px;
      }

      .title{
        font-size:28px;
        margin-bottom:25px;
      }

      .form-container{
        padding:20px;
        border-radius:18px;
      }

      .row{
        grid-template-columns:1fr;
        gap:0;
      }

      .form-group input,
      .form-group textarea,
      .form-group select{
        padding:14px;
        font-size:15px;
      }

      .checkboxes{
        flex-direction:column;
        align-items:flex-start;
      }

      .submit-btn{
        padding:16px;
        font-size:16px;
      }

    }

    @media(max-width:480px){

      .title{
        font-size:24px;
      }

      .logo{
        font-size:24px;
      }

      .sidebar{
        width:85%;
      }

      .form-container{
        padding:16px;
      }

    }

  </style>
</head>

<body>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">Admin</div>

    <nav>
      <a href="dashboard.html">Контролен панел</a>
      <a href="add-product.html">Добави продукт</a>
      <a href="products.html">Продукти</a>
      <a href="orders.html">Поръчки</a>
      <a href="users.html">Потребители</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1 class="title">Добави нов продукт</h1>

    <form class="form-container" id="productForm">

      <div class="form-group">
        <label>Име на продукта</label>
        <input type="text" id="title" placeholder="Въведете име на продукта">
      </div>

      <div class="form-group">
        <label>Описание</label>
        <textarea id="description" placeholder="Описание на продукта"></textarea>
      </div>

      <div class="row">

        <div class="form-group">
          <label>Цена</label>
          <input type="number" id="price" placeholder="Цена">
        </div>

        <div class="form-group">
          <label>Стара цена</label>
          <input type="number" id="oldPrice" placeholder="Стара цена">
        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Категория</label>

          <select id="category">
            <option>Електроника</option>
            <option>Мода</option>
            <option>Аксесоари</option>
            <option>Игри</option>
            <option>Дом и кухня</option>
            <option>Дигитални продукти</option>
          </select>

        </div>

        <div class="form-group">

          <label>Тип продукт</label>

          <select id="type">
            <option>Физически продукт</option>
            <option>Дигитален продукт</option>
            <option>Услуга</option>
          </select>

        </div>

      </div>

      <div class="row">

        <div class="form-group">
          <label>Количество</label>
          <input type="number" id="stock" placeholder="Количество">
        </div>

        <div class="form-group">
          <label>Статус</label>

          <select id="status">
            <option>В наличност</option>
            <option>Изчерпан</option>
            <option>Очаквайте скоро</option>
          </select>

        </div>

      </div>

      <div class="row">

        <div class="form-group">

          <label>Състояние на продукта</label>

          <select id="condition">
            <option value="new">Нов</option>
            <option value="used">Използван</option>
            <option value="refurbished">Рефърбишд</option>
          </select>

        </div>

        <div class="form-group">
          <label>Гаранция (месеци)</label>
          <input type="number" id="warranty" placeholder="Пример: 12">
        </div>

      </div>

      <div class="form-group">

        <label>Снимки на продукта (може повече от една)</label>

        <input
          type="file"
          id="images"
          accept="image/*"
          multiple
        >

      </div>

      <div class="form-group">

        <label>Допълнителни опции</label>

        <div class="checkboxes">

          <label>
            <input type="checkbox" id="featured">
            Featured Product
          </label>

          <label>
            <input type="checkbox" id="bestSeller">
            Best Seller
          </label>

          <label>
            <input type="checkbox" id="onSale">
            On Sale
          </label>

        </div>

      </div>

      <button type="submit" class="submit-btn">
        Запази продукта
      </button>

    </form>

  </main>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>

    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("show");
    });

  </script>

  <script type="module" src="../js/admin-add-product.js"></script>

</body>
</html>
