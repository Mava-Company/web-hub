<!-- admin/add-product.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Добави продукт</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
    }

    .sidebar{
      width:280px;
      height:100vh;
      background:#111827;
      padding:30px;
      position:fixed;
      left:0;
      top:0;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:50px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-bottom:10px;
      border-radius:12px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    .main{
      margin-left:280px;
      width:100%;
      padding:40px;
    }

    .title{
      font-size:40px;
      margin-bottom:40px;
    }

    .form-container{
      background:#1e293b;
      padding:40px;
      border-radius:20px;
      max-width:1000px;
    }

    .form-group{
      margin-bottom:25px;
    }

    .form-group label{
      display:block;
      margin-bottom:10px;
      color:#cbd5e1;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      font-size:16px;
    }

    textarea{
      min-height:150px;
      resize:none;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .checkboxes{
      display:flex;
      gap:20px;
      margin-top:10px;
    }

    .checkboxes label{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      margin-top:20px;
    }

    .submit-btn:hover{
      background:#7c3aed;
    }



    .toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #28a745;
  color: white;
  padding: 14px 18px;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.3s ease;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

  </style>
</head>

<body>

<div class="sidebar">

  <div class="logo">Admin</div>

  <a href="dashboard.html">Контролен панел</a>
  <a href="add-product.html">Добави продукт</a>
  <a href="products.html">Продукти</a>
  <a href="orders.html">Поръчки</a>
  <a href="users.html">Потребители</a>

</div>

<div class="main">

  <h1 class="title">Добави нов продукт</h1>

  <form class="form-container" id="productForm">

    <div class="form-group">
      <label>Име на продукта</label>
      <input type="text" id="title" placeholder="Въведете име на продукта">
    </div>

    <div class="form-group">
      <label>Описание</label>
      <textarea id="description" placeholder="Описание на продукта"></textarea>
    </div>

    <div class="row">

      <div class="form-group">
        <label>Цена</label>
        <input type="number" id="price" placeholder="Цена">
      </div>

      <div class="form-group">
        <label>Стара цена</label>
        <input type="number" id="oldPrice" placeholder="Стара цена">
      </div>

    </div>

    <div class="row">

      <div class="form-group">
        <label>Категория</label>
        <select id="category">
          <option>Електроника</option>
          <option>Мода</option>
          <option>Аксесоари</option>
          <option>Игри</option>
          <option>Дом и кухня</option>
          <option>Дигитални продукти</option>
        </select>
      </div>

      <div class="form-group">
        <label>Тип продукт</label>
        <select id="type">
          <option>Физически продукт</option>
          <option>Дигитален продукт</option>
          <option>Услуга</option>
        </select>
      </div>

    </div>

    <div class="row">

      <div class="form-group">
        <label>Количество</label>
        <input type="number" id="stock" placeholder="Количество">
      </div>

      <div class="form-group">
        <label>Статус</label>
        <select id="status">
          <option>В наличност</option>
          <option>Изчерпан</option>
          <option>Очаквайте скоро</option>
        </select>
      </div>

    </div>


    <div class="row">

  <div class="form-group">
    <label>Състояние на продукта</label>

    <select id="condition">
      <option value="new">Нов</option>
      <option value="used">Използван</option>
      <option value="refurbished">Рефърбишд</option>
    </select>

  </div>

  <div class="form-group">
    <label>Гаранция (месеци)</label>
    <input type="number" id="warranty" placeholder="Пример: 12">
  </div>

</div>



    <!-- 🔥 MULTIPLE IMAGES INPUT -->
    <div class="form-group">
      <label>Снимки на продукта (може повече от една)</label>
      <input type="file" id="images" accept="image/*" multiple>
    </div>

    <div class="form-group">
      <label>Допълнителни опции</label>

      <div class="checkboxes">

        <label>
          <input type="checkbox" id="featured">
          Featured Product
        </label>

        <label>
          <input type="checkbox" id="bestSeller">
          Best Seller
        </label>

        <label>
          <input type="checkbox" id="onSale">
          On Sale
        </label>

      </div>

    </div>

    <button type="submit" class="submit-btn">
      Запази продукта
    </button>

  </form>

</div>
<div id="toast" class="toast"></div>
<script type="module" src="../js/admin-add-product.js"></script>
</body>
</html>
