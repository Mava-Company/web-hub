<!-- admin/dashboard.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
    }

    .sidebar{
      width:280px;
      height:100vh;
      background:#111827;
      padding:30px;
      position:fixed;
      left:0;
      top:0;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:50px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-bottom:10px;
      border-radius:12px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    .main{
      margin-left:280px;
      width:100%;
      padding:40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
    }

    .topbar h1{
      font-size:40px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      margin-bottom:50px;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
    }

    .card h3{
      color:#94a3b8;
      margin-bottom:15px;
    }

    .card .number{
      font-size:40px;
      color:#8b5cf6;
      font-weight:bold;
    }

    .orders-section{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
    }

    .orders-section h2{
      margin-bottom:25px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:15px;
      text-align:left;
      border-bottom:1px solid #334155;
    }

    table th{
      color:#94a3b8;
    }

    .status{
      padding:8px 15px;
      border-radius:10px;
      font-size:14px;
    }

    .pending{
      background:#f59e0b;
    }

    .processing{
      background:#3b82f6;
    }

    .delivered{
      background:#22c55e;
    }

  </style>
</head>

<body>

<div class="sidebar">

  <div class="logo">Admin</div>

  <a href="dashboard.html">Контролен панел</a>
  <a href="add-product.html">Добави продукт</a>
  <a href="products.html">Продукти</a>
  <a href="orders.html">Поръчки</a>
  <a href="users.html">Потребители</a>

</div>

<div class="main">

  <div class="topbar">
    <h1>Контролен панел</h1>
  </div>

  <!-- 🔥 CARDS (ديناميكية) -->
  <div class="cards">

    <div class="card">
      <h3>Общо поръчки</h3>
      <div class="number" id="ordersCount">0</div>
    </div>

    <div class="card">
      <h3>Продукти</h3>
      <div class="number" id="productsCount">0</div>
    </div>

    <div class="card">
      <h3>Потребители</h3>
      <div class="number" id="usersCount">0</div>
    </div>

    <div class="card">
      <h3>Приходи</h3>
      <div class="number" id="revenue">0 лв</div>
    </div>

  </div>

  <!-- 🔥 ORDERS TABLE -->
  <div class="orders-section">

    <h2>Последни поръчки</h2>

    <table>

      <thead>
        <tr>
          <th>Поръчка</th>
          <th>Клиент</th>
          <th>Телефон</th>
          <th>Общо</th>
          <th>Статус</th>
        </tr>
      </thead>

      <tbody id="ordersTable"></tbody>

    </table>

  </div>

</div>

<script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
