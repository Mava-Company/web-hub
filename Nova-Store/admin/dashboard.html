<!-- admin/dashboard.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
    }

    /* =========================
       SIDEBAR
    ========================== */

    .sidebar{
      width:260px;
      height:100vh;
      background:#111827;
      padding:25px 18px;
      position:fixed;
      left:0;
      top:0;
      overflow-y:auto;
      z-index:1000;
      transition:0.3s;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:40px;
      text-align:center;
    }

    .sidebar nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:14px 16px;
      border-radius:12px;
      transition:0.3s;
      font-size:15px;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    /* =========================
       MAIN CONTENT
    ========================== */

    .main{
      margin-left:260px;
      width:calc(100% - 260px);
      padding:40px;
      transition:0.3s;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
      gap:20px;
    }

    .topbar h1{
      font-size:38px;
      line-height:1.3;
    }

    /* =========================
       CARDS
    ========================== */

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:25px;
      margin-bottom:45px;
    }

    .card{
      background:#1e293b;
      padding:28px;
      border-radius:22px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-4px);
    }

    .card h3{
      color:#94a3b8;
      margin-bottom:15px;
      font-size:16px;
      font-weight:normal;
    }

    .card .number{
      font-size:38px;
      color:#8b5cf6;
      font-weight:bold;
      word-break:break-word;
    }

    /* =========================
       ORDERS SECTION
    ========================== */

    .orders-section{
      background:#1e293b;
      padding:30px;
      border-radius:22px;
      overflow:hidden;
    }

    .orders-section h2{
      margin-bottom:25px;
      font-size:28px;
    }

    .table-wrapper{
      width:100%;
      overflow-x:auto;
      border-radius:14px;
    }

    table{
      width:100%;
      min-width:700px;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:16px;
      text-align:left;
      border-bottom:1px solid #334155;
      white-space:nowrap;
    }

    table th{
      color:#94a3b8;
      font-weight:normal;
      font-size:15px;
    }

    table td{
      font-size:15px;
    }

    .status{
      display:inline-block;
      padding:8px 14px;
      border-radius:10px;
      font-size:13px;
      font-weight:bold;
    }

    .pending{
      background:#f59e0b;
      color:white;
    }

    .processing{
      background:#3b82f6;
      color:white;
    }

    .delivered{
      background:#22c55e;
      color:white;
    }

    /* =========================
       MOBILE BUTTON
    ========================== */

    .menu-btn{
      display:none;
      position:fixed;
      top:15px;
      left:15px;
      width:48px;
      height:48px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:22px;
      cursor:pointer;
      z-index:2000;
    }

    /* =========================
       OVERLAY
    ========================== */

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      opacity:0;
      visibility:hidden;
      transition:0.3s;
      z-index:900;
    }

    .overlay.show{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:992px){

      .main{
        padding:30px 20px;
      }

      .cards{
        grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      }

    }

    @media(max-width:768px){

      .menu-btn{
        display:flex;
        align-items:center;
        justify-content:center;
      }

      .sidebar{
        left:-100%;
        width:260px;
      }

      .sidebar.active{
        left:0;
      }

      .main{
        margin-left:0;
        width:100%;
        padding:85px 16px 25px;
      }

      .topbar{
        margin-bottom:30px;
      }

      .topbar h1{
        font-size:28px;
      }

      .cards{
        grid-template-columns:1fr;
        gap:18px;
      }

      .card{
        padding:24px;
      }

      .card .number{
        font-size:32px;
      }

      .orders-section{
        padding:20px;
        border-radius:18px;
      }

      .orders-section h2{
        font-size:24px;
      }

      table th,
      table td{
        padding:14px;
        font-size:14px;
      }

    }

    @media(max-width:480px){

      .sidebar{
        width:85%;
      }

      .topbar h1{
        font-size:24px;
      }

      .card{
        padding:20px;
      }

      .card .number{
        font-size:28px;
      }

      .orders-section{
        padding:16px;
      }

    }

  </style>
</head>

<body>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">Admin</div>

    <nav>
      <a href="dashboard.html">Контролен панел</a>
      <a href="add-product.html">Добави продукт</a>
      <a href="products.html">Продукти</a>
      <a href="orders.html">Поръчки</a>
      <a href="users.html">Потребители</a>
    </nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <div class="topbar">
      <h1>Контролен панел</h1>
    </div>

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <h3>Общо поръчки</h3>
        <div class="number" id="ordersCount">0</div>
      </div>

      <div class="card">
        <h3>Продукти</h3>
        <div class="number" id="productsCount">0</div>
      </div>

      <div class="card">
        <h3>Потребители</h3>
        <div class="number" id="usersCount">0</div>
      </div>

      <div class="card">
        <h3>Приходи</h3>
        <div class="number" id="revenue">0 лв</div>
      </div>

    </div>

    <!-- ORDERS -->
    <div class="orders-section">

      <h2>Последни поръчки</h2>

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>
              <th>Поръчка</th>
              <th>Клиент</th>
              <th>Телефон</th>
              <th>Общо</th>
              <th>Статус</th>
            </tr>

          </thead>

          <tbody id="ordersTable"></tbody>

        </table>

      </div>

    </div>

  </main>

  <script>

    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("show");
    });

  </script>

  <script type="module" src="../js/admin-dashboard.js"></script>

</body>
</html>
