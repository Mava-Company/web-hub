<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Редакция на продукт</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:auto;
      background:#1e293b;
      padding:35px;
      border-radius:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    h2{
      margin-bottom:30px;
      font-size:32px;
      line-height:1.3;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .field{
      display:flex;
      flex-direction:column;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      font-size:14px;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      outline:none;
      background:#0f172a;
      color:white;
      font-size:15px;
      transition:0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border:1px solid #8b5cf6;
    }

    textarea{
      resize:vertical;
      min-height:120px;
    }

    input[type="file"]{
      padding:12px;
      cursor:pointer;
    }

    .checkboxes{
      display:flex;
      gap:20px;
      margin-top:25px;
      flex-wrap:wrap;
    }

    .checkboxes label{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      cursor:pointer;
      color:white;
    }

    .checkboxes input{
      width:auto;
    }

    .btn{
      margin-top:30px;
      width:100%;
      padding:16px;
      background:#8b5cf6;
      color:white;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:17px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#7c3aed;
    }

    /* =========================
       TOAST
    ========================== */

    .toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      color:white;
      padding:14px 18px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      font-size:14px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s ease;
      z-index:9999;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:768px){

      body{
        padding:14px;
      }

      .container{
        padding:22px;
        border-radius:20px;
      }

      h2{
        font-size:26px;
        margin-bottom:24px;
      }

      .grid{
        grid-template-columns:1fr;
        gap:18px;
      }

      .full{
        grid-column:auto;
      }

      input,
      textarea,
      select{
        padding:13px;
        font-size:14px;
      }

      .checkboxes{
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
      }

      .btn{
        padding:15px;
        font-size:16px;
      }

    }

    @media(max-width:480px){

      body{
        padding:10px;
      }

      .container{
        padding:18px;
      }

      h2{
        font-size:22px;
      }

      label{
        font-size:13px;
      }

      input,
      textarea,
      select{
        font-size:14px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h2>✏️ Редакция на продукт</h2>

    <form id="productForm">

      <div class="grid">

        <div class="field">
          <label>Име на продукта</label>
          <input id="title" type="text">
        </div>

        <div class="field">
          <label>Категория</label>

          <select id="category">
            <option value="">Избери категория</option>
            <option value="electronics">Електроника</option>
            <option value="fashion">Мода</option>
            <option value="home">Дом</option>
            <option value="sports">Спорт</option>
          </select>

        </div>

        <div class="field">
          <label>Цена</label>
          <input id="price" type="number">
        </div>

        <div class="field">
          <label>Стара цена</label>
          <input id="oldPrice" type="number">
        </div>

        <div class="field">
          <label>Количество</label>
          <input id="stock" type="number">
        </div>

        <div class="field">
          <label>Гаранция (месеци)</label>
          <input id="warranty" type="number">
        </div>

        <div class="field full">
          <label>Описание</label>
          <textarea id="description"></textarea>
        </div>

        <div class="field">
          <label>Тип</label>
          <input id="type" type="text">
        </div>

        <div class="field">
          <label>Статус</label>

          <select id="status">
            <option value="active">Активен</option>
            <option value="inactive">Неактивен</option>
            <option value="draft">Чернова</option>
          </select>

        </div>

        <div class="field">
          <label>Състояние</label>

          <select id="condition">
            <option value="new">Ново</option>
            <option value="used">Използвано</option>
            <option value="refurbished">Рефабрикувано</option>
          </select>

        </div>

        <div class="field">
          <label>Снимки</label>
          <input id="images" type="file" multiple>
        </div>

      </div>

      <div class="checkboxes">

        <label>
          <input type="checkbox" id="featured">
          Препоръчан
        </label>

        <label>
          <input type="checkbox" id="bestSeller">
          Най-продаван
        </label>

        <label>
          <input type="checkbox" id="onSale">
          На промоция
        </label>

      </div>

      <button class="btn" type="submit">
        💾 Запази промените
      </button>

    </form>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script type="module" src="../js/edit-product.js"></script>

</body>

</html>
