<!-- admin/orders.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Поръчки</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
    }

    /* =========================
       SIDEBAR
    ========================== */

    .sidebar{
      width:260px;
      height:100vh;
      background:#111827;
      padding:25px 18px;
      position:fixed;
      left:0;
      top:0;
      overflow-y:auto;
      z-index:1000;
      transition:0.3s;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:40px;
      text-align:center;
    }

    .sidebar nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:14px 16px;
      border-radius:12px;
      transition:0.3s;
      font-size:15px;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    /* =========================
       MAIN CONTENT
    ========================== */

    .main{
      margin-left:260px;
      width:calc(100% - 260px);
      padding:40px;
      transition:0.3s;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:35px;
      gap:20px;
    }

    .topbar h1{
      font-size:38px;
      line-height:1.3;
    }

    /* =========================
       ORDERS
    ========================== */

    .orders-container{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .order-card{
      background:#1e293b;
      border-radius:24px;
      padding:28px;
      overflow:hidden;
    }

    .order-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .order-id{
      font-size:24px;
      color:#8b5cf6;
      word-break:break-word;
    }

    .status{
      padding:10px 18px;
      border-radius:12px;
      font-size:13px;
      font-weight:bold;
      white-space:nowrap;
    }

    .pending{
      background:#f59e0b;
      color:white;
    }

    .processing{
      background:#3b82f6;
      color:white;
    }

    .delivered{
      background:#22c55e;
      color:white;
    }

    /* =========================
       DETAILS
    ========================== */

    .order-details{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:18px;
      margin-bottom:25px;
    }

    .detail-box{
      background:#0f172a;
      padding:20px;
      border-radius:18px;
      overflow-wrap:break-word;
    }

    .detail-box h3{
      margin-bottom:15px;
      color:#94a3b8;
      font-size:15px;
      font-weight:normal;
    }

    .detail-box p{
      margin-bottom:10px;
      color:#e2e8f0;
      line-height:1.5;
      word-break:break-word;
      font-size:14px;
    }

    /* =========================
       PRODUCTS
    ========================== */

    .products{
      margin-top:20px;
    }

    .products h3{
      margin-bottom:20px;
      font-size:22px;
    }

    .product{
      display:flex;
      align-items:center;
      gap:18px;
      background:#0f172a;
      padding:16px;
      border-radius:18px;
      margin-bottom:15px;
    }

    .product img{
      width:80px;
      height:80px;
      border-radius:14px;
      object-fit:cover;
      flex-shrink:0;
    }

    .product-info{
      flex:1;
      min-width:0;
    }

    .product-info h4{
      margin-bottom:8px;
      font-size:16px;
      word-break:break-word;
    }

    .product-info p{
      color:#cbd5e1;
      font-size:14px;
      line-height:1.5;
      word-break:break-word;
    }

    /* =========================
       ACTIONS
    ========================== */

    .actions{
      margin-top:25px;
      display:flex;
      flex-wrap:wrap;
      gap:15px;
    }

    .actions button{
      border:none;
      padding:13px 20px;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-size:14px;
      transition:0.3s;
      flex:1;
      min-width:150px;
    }

    .actions button:hover{
      opacity:0.9;
    }

    .confirm-btn{
      background:#22c55e;
    }

    .process-btn{
      background:#3b82f6;
    }

    .cancel-btn{
      background:#ef4444;
    }

    /* =========================
       MOBILE BUTTON
    ========================== */

    .menu-btn{
      display:none;
      position:fixed;
      top:15px;
      left:15px;
      width:48px;
      height:48px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:22px;
      cursor:pointer;
      z-index:2000;
    }

    /* =========================
       OVERLAY
    ========================== */

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      opacity:0;
      visibility:hidden;
      transition:0.3s;
      z-index:900;
    }

    .overlay.show{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:768px){

      .menu-btn{
        display:flex;
        align-items:center;
        justify-content:center;
      }

      .sidebar{
        left:-100%;
        width:260px;
      }

      .sidebar.active{
        left:0;
      }

      .main{
        margin-left:0;
        width:100%;
        padding:85px 16px 25px;
      }

      .topbar{
        margin-bottom:28px;
      }

      .topbar h1{
        font-size:28px;
      }

      .order-card{
        padding:20px;
        border-radius:20px;
      }

      .order-header{
        align-items:flex-start;
      }

      .order-id{
        font-size:20px;
      }

      .order-details{
        grid-template-columns:1fr;
      }

      .product{
        flex-direction:column;
        align-items:flex-start;
      }

      .product img{
        width:100%;
        height:220px;
      }

      .actions{
        flex-direction:column;
      }

      .actions button{
        width:100%;
        min-width:auto;
      }

    }

    @media(max-width:480px){

      .sidebar{
        width:85%;
      }

      .topbar h1{
        font-size:24px;
      }

      .order-card{
        padding:16px;
      }

      .detail-box{
        padding:16px;
      }

      .product img{
        height:180px;
      }

    }

  </style>
</head>

<body>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">Admin</div>

    <nav>
      <a href="dashboard.html">Контролен панел</a>
      <a href="add-product.html">Добави продукт</a>
      <a href="products.html">Продукти</a>
      <a href="orders.html">Поръчки</a>
      <a href="users.html">Потребители</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h1>Поръчки</h1>
    </div>

    <div class="orders-container" id="ordersContainer"></div>

  </main>

  <script>

    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("show");
    });

  </script>

  <script type="module" src="../js/admin-orders.js"></script>

</body>
</html>
