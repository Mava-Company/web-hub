<!-- admin/products.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Продукти</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
    }

    /* =========================
       SIDEBAR
    ========================== */

    .sidebar{
      width:260px;
      height:100vh;
      background:#111827;
      padding:25px 18px;
      position:fixed;
      left:0;
      top:0;
      overflow-y:auto;
      z-index:1000;
      transition:0.3s;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:40px;
      text-align:center;
    }

    .sidebar nav{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:14px 16px;
      border-radius:12px;
      transition:0.3s;
      font-size:15px;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    /* =========================
       MAIN CONTENT
    ========================== */

    .main{
      margin-left:260px;
      width:calc(100% - 260px);
      padding:40px;
      transition:0.3s;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:35px;
      flex-wrap:wrap;
    }

    .topbar h1{
      font-size:38px;
      line-height:1.3;
    }

    .add-btn{
      padding:14px 24px;
      background:#8b5cf6;
      color:white;
      text-decoration:none;
      border-radius:12px;
      transition:0.3s;
      font-size:15px;
      white-space:nowrap;
    }

    .add-btn:hover{
      background:#7c3aed;
    }

    /* =========================
       TABLE
    ========================== */

    .products-table{
      background:#1e293b;
      padding:28px;
      border-radius:24px;
      overflow:hidden;
    }

    .table-wrapper{
      width:100%;
      overflow-x:auto;
      border-radius:14px;
    }

    table{
      width:100%;
      min-width:850px;
      border-collapse:collapse;
    }

    table th,
    table td{
      padding:18px;
      text-align:left;
      border-bottom:1px solid #334155;
      vertical-align:middle;
    }

    table th{
      color:#94a3b8;
      font-size:15px;
      font-weight:normal;
      white-space:nowrap;
    }

    table td{
      font-size:14px;
      color:#e2e8f0;
    }

    /* =========================
       PRODUCT INFO
    ========================== */

    .product-info{
      display:flex;
      align-items:center;
      gap:15px;
      min-width:220px;
    }

    .product-info img{
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:14px;
      flex-shrink:0;
    }

    .product-info div{
      min-width:0;
    }

    .product-info h4{
      margin-bottom:6px;
      font-size:15px;
      word-break:break-word;
    }

    .product-info p{
      color:#94a3b8;
      font-size:13px;
      word-break:break-word;
    }

    /* =========================
       STATUS
    ========================== */

    .status{
      display:inline-block;
      padding:8px 14px;
      border-radius:10px;
      font-size:13px;
      font-weight:bold;
      white-space:nowrap;
    }

    .available{
      background:#22c55e;
      color:white;
    }

    .out{
      background:#ef4444;
      color:white;
    }

    /* =========================
       ACTIONS
    ========================== */

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .edit-btn,
    .delete-btn{
      border:none;
      padding:10px 15px;
      border-radius:10px;
      color:white;
      cursor:pointer;
      font-size:13px;
      transition:0.3s;
      white-space:nowrap;
    }

    .edit-btn:hover,
    .delete-btn:hover{
      opacity:0.9;
    }

    .edit-btn{
      background:#3b82f6;
    }

    .delete-btn{
      background:#ef4444;
    }

    /* =========================
       TOAST
    ========================== */

    .toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#22c55e;
      color:white;
      padding:14px 20px;
      border-radius:10px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s;
      z-index:9999;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    /* =========================
       MOBILE MENU BUTTON
    ========================== */

    .menu-btn{
      display:none;
      position:fixed;
      top:15px;
      left:15px;
      width:48px;
      height:48px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:22px;
      cursor:pointer;
      z-index:2000;
    }

    /* =========================
       OVERLAY
    ========================== */

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      opacity:0;
      visibility:hidden;
      transition:0.3s;
      z-index:900;
    }

    .overlay.show{
      opacity:1;
      visibility:visible;
    }

    /* =========================
       RESPONSIVE
    ========================== */

    @media(max-width:768px){

      .menu-btn{
        display:flex;
        align-items:center;
        justify-content:center;
      }

      .sidebar{
        left:-100%;
        width:260px;
      }

      .sidebar.active{
        left:0;
      }

      .main{
        margin-left:0;
        width:100%;
        padding:85px 16px 25px;
      }

      .topbar{
        align-items:flex-start;
        margin-bottom:28px;
      }

      .topbar h1{
        font-size:28px;
      }

      .add-btn{
        width:100%;
        text-align:center;
      }

      .products-table{
        padding:18px;
        border-radius:20px;
      }

      table th,
      table td{
        padding:14px;
      }

      .product-info{
        min-width:240px;
      }

      .actions{
        flex-direction:column;
      }

      .edit-btn,
      .delete-btn{
        width:100%;
      }

    }

    @media(max-width:480px){

      .sidebar{
        width:85%;
      }

      .topbar h1{
        font-size:24px;
      }

      .products-table{
        padding:14px;
      }

      .product-info img{
        width:60px;
        height:60px;
      }

    }

  </style>
</head>

<body>

  <!-- MOBILE MENU BUTTON -->
  <button class="menu-btn" id="menuBtn">
    ☰
  </button>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">Admin</div>

    <nav>
      <a href="dashboard.html">Контролен панел</a>
      <a href="add-product.html">Добави продукт</a>
      <a href="products.html">Продукти</a>
      <a href="orders.html">Поръчки</a>
      <a href="users.html">Потребители</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">

      <h1>Продукти</h1>

      <a href="add-product.html" class="add-btn">
        + Добави продукт
      </a>

    </div>

    <div class="products-table">

      <div class="table-wrapper">

        <table>

          <thead>

            <tr>
              <th>Продукт</th>
              <th>Категория</th>
              <th>Цена</th>
              <th>Количество</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>

          </thead>

          <tbody id="productsTable"></tbody>

        </table>

      </div>

    </div>

  </main>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script>

    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      overlay.classList.toggle("show");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("show");
    });

  </script>

  <script type="module" src="../js/admin-products.js"></script>

</body>
</html>
