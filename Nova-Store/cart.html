<!-- cart.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Store</title>

  <style>

    /* RESET */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#222;
      overflow-x:hidden;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* =========================
       HEADER
    ========================== */

    header{
      background:#111;
      color:white;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:999;
      gap:20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#00bcd4;
      white-space:nowrap;
    }

    nav{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:16px;
      transition:0.3s;
      white-space:nowrap;
    }

    nav a:hover{
      color:#00bcd4;
    }

    /* =========================
       CONTAINER
    ========================== */

    .container{
      max-width:1400px;
      margin:auto;
      padding:50px 40px;
    }

    .container h1{
      font-size:42px;
      margin-bottom:35px;
      color:#111;
      line-height:1.3;
    }

    /* =========================
       CART WRAPPER
    ========================== */

    .cart-wrapper{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:30px;
      align-items:start;
    }

    /* =========================
       CART ITEMS
    ========================== */

    .cart-items{
      display:flex;
      flex-direction:column;
      gap:20px;
      min-width:0;
    }

    /* =========================
       CART ITEM
    ========================== */

    .cart-item{
      background:white;
      border-radius:20px;
      padding:20px;
      display:flex;
      gap:20px;
      align-items:center;
      box-shadow:0 5px 18px rgba(0,0,0,.08);
      transition:0.3s;
      overflow:hidden;
    }

    .cart-item:hover{
      transform:translateY(-3px);
      box-shadow:0 8px 24px rgba(0,0,0,.12);
    }

    /* =========================
       IMAGE
    ========================== */

    .cart-item img{
      width:140px;
      height:140px;
      object-fit:cover;
      border-radius:16px;
      background:#eee;
      flex-shrink:0;
    }

    /* =========================
       INFO
    ========================== */

    .item-info{
      flex:1;
      min-width:0;
    }

    .item-info h3{
      font-size:24px;
      margin-bottom:12px;
      color:#111;
      line-height:1.4;
      word-break:break-word;
    }

    .item-price{
      color:#00bcd4;
      font-size:22px;
      font-weight:bold;
      margin-bottom:15px;
    }

    /* =========================
       QUANTITY
    ========================== */

    .quantity{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .quantity button{
      width:38px;
      height:38px;
      border:none;
      background:#111;
      color:white;
      border-radius:10px;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
    }

    .quantity button:hover{
      background:#00bcd4;
    }

    .quantity span{
      font-size:18px;
      min-width:25px;
      text-align:center;
    }

    /* =========================
       REMOVE BUTTON
    ========================== */

    .remove-btn{
      background:#ff4d4d;
      color:white;
      border:none;
      padding:11px 16px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
      white-space:nowrap;
    }

    .remove-btn:hover{
      background:#e60000;
    }

    /* =========================
       SUMMARY
    ========================== */

    .summary{
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 5px 18px rgba(0,0,0,.08);
      position:sticky;
      top:100px;
      overflow:hidden;
    }

    .summary h2{
      font-size:30px;
      margin-bottom:25px;
      color:#111;
    }

    /* =========================
       SUMMARY ITEM
    ========================== */

    .summary-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:15px;
      margin-bottom:18px;
      font-size:18px;
      color:#555;
    }

    /* =========================
       TOTAL
    ========================== */

    #total{
      color:#00bcd4;
      font-weight:bold;
      font-size:24px;
    }

    /* =========================
       CHECKOUT BUTTON
    ========================== */

    .checkout-btn{
      width:100%;
      margin-top:25px;
      padding:16px;
      border:none;
      background:#111;
      color:white;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .checkout-btn:hover{
      background:#00bcd4;
      transform:translateY(-2px);
    }

    /* =========================
       EMPTY CART
    ========================== */

    .empty-cart{
      background:white;
      padding:60px 20px;
      text-align:center;
      border-radius:20px;
      box-shadow:0 5px 18px rgba(0,0,0,.08);
    }

    .empty-cart h2{
      font-size:30px;
      margin-bottom:15px;
    }

    .empty-cart p{
      color:#777;
      margin-bottom:25px;
      line-height:1.6;
    }

    .empty-cart a{
      background:#00bcd4;
      color:white;
      text-decoration:none;
      padding:14px 25px;
      border-radius:10px;
      transition:0.3s;
      display:inline-block;
    }

    .empty-cart a:hover{
      background:#0097a7;
    }

    /* =========================
       SPECIAL OFFER
    ========================== */

    .special-offer{
      grid-column:1 / -1;
      background:#fff;
      padding:25px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      margin-top:10px;
    }

    .special-offer h3{
      font-size:28px;
      margin-bottom:12px;
      color:#111;
    }

    .special-offer p{
      color:#555;
      margin-bottom:20px;
      line-height:1.6;
    }

    .offer-image{
      width:100%;
      max-width:500px;
      border-radius:16px;
      margin:20px auto;
      object-fit:cover;
    }

    .gift-btn{
      display:inline-block;
      background:linear-gradient(135deg,#ff4f81,#ff8a00);
      color:#fff;
      padding:14px 22px;
      border-radius:14px;
      font-weight:bold;
      text-decoration:none;
      font-size:16px;
      box-shadow:0 6px 15px rgba(0,0,0,0.15);
      transition:all 0.3s ease;
      margin-top:10px;
    }

    .gift-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(0,0,0,0.2);
      opacity:0.95;
    }

    /* =========================
       FOOTER
    ========================== */

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:60px;
    }

    /* =========================
       TABLET
    ========================== */

    @media(max-width:1100px){

      .cart-wrapper{
        grid-template-columns:1fr;
      }

      .summary{
        position:static;
      }

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:768px){

      header{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
      }

      .logo{
        font-size:24px;
      }

      nav{
        width:100%;
        justify-content:flex-start;
        gap:14px;
      }

      nav a{
        font-size:15px;
      }

      .container{
        padding:30px 16px;
      }

      .container h1{
        font-size:30px;
        text-align:center;
        margin-bottom:28px;
      }

      .cart-item{
        flex-direction:column;
        align-items:flex-start;
        text-align:left;
        padding:18px;
      }

      .cart-item img{
        width:100%;
        height:240px;
      }

      .item-info{
        width:100%;
      }

      .item-info h3{
        font-size:22px;
      }

      .quantity{
        justify-content:flex-start;
      }

      .remove-btn{
        width:100%;
        margin-top:15px;
      }

      .summary{
        padding:24px 20px;
      }

      .summary h2{
        font-size:26px;
      }

      .summary-item{
        font-size:16px;
      }

      #total{
        font-size:22px;
      }

      .checkout-btn{
        font-size:17px;
      }

      .special-offer{
        padding:20px;
      }

      .special-offer h3{
        font-size:24px;
      }

    }

    /* =========================
       SMALL MOBILE
    ========================== */

    @media(max-width:480px){

      header{
        padding:18px 15px;
      }

      nav{
        flex-direction:column;
        align-items:flex-start;
      }

      .container{
        padding:25px 12px;
      }

      .container h1{
        font-size:26px;
      }

      .cart-item{
        padding:15px;
        border-radius:18px;
      }

      .cart-item img{
        height:200px;
      }

      .item-info h3{
        font-size:20px;
      }

      .item-price{
        font-size:20px;
      }

      .summary{
        padding:20px 16px;
        border-radius:18px;
      }

      .summary h2{
        font-size:24px;
      }

      .special-offer{
        padding:16px;
      }

      .special-offer h3{
        font-size:22px;
      }

      .gift-btn{
        width:100%;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">Nova Store</div>

    <nav>
      <a href="index.html">Начало</a>
      <a href="products.html">Продукти</a>
      <a href="cart.html">Количка</a>
      <a href="track-order.html">Проследяване на поръчка</a>
      <a id="authLink" href="login.html">Вход</a>
    </nav>

  </header>

  <!-- MAIN -->

  <div class="container">

    <h1>Моята количка</h1>

    <div class="cart-wrapper">

      <!-- CART ITEMS -->
      <div class="cart-items" id="cartItems"></div>

      <!-- SUMMARY -->
      <div class="summary">

        <h2>Обобщение</h2>

        <div class="summary-item">
          <span>Продукти</span>
          <span id="count">0</span>
        </div>

        <div class="summary-item">
          <span>Общо</span>
          <span id="total">0 лв</span>
        </div>

        <button class="checkout-btn" id="checkoutBtn">
          Продължи към плащане
        </button>

      </div>

      <!-- SPECIAL OFFER -->

      <div class="special-offer">

        <h3>🎁 Специална оферта</h3>

        <p>Получете безплатен подарък сега</p>

        <a href="https://playabledownload.com/1895920" target="_blank">
          <img
            src="images/gift.jpg"
            alt="Специална оферта"
            class="offer-image"
          >
        </a>

        <a
          href="https://playabledownload.com/1895920"
          target="_blank"
          class="gift-btn"
        >
          🎁 Кликни тук за подарък
        </a>

      </div>

    </div>

  </div>

  <!-- FOOTER -->

  <footer>
    © 2026 Nova Store. Всички права запазени.
  </footer>

  <script type="module">

    import { db, auth } from "./js/firebase-config.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const authLink = document.getElementById("authLink");

    onAuthStateChanged(auth, (user) => {

      if(user){

        authLink.textContent = "Профил";
        authLink.href = "profile.html";

      } else {

        authLink.textContent = "Вход";
        authLink.href = "login.html";

      }

    });

  </script>

  <script type="module" src="js/cart.js"></script>

</body>
</html>
