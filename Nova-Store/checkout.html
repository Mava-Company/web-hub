<!-- checkout.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Завършване на поръчка</title>

  <style>

    /* RESET */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#222;
      overflow-x:hidden;
    }

    input,
    textarea,
    button{
      font-family:inherit;
    }

    /* =========================
       HEADER
    ========================== */

    header{
      background:#111;
      color:white;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:999;
      gap:20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#00bcd4;
      white-space:nowrap;
    }

    nav{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:16px;
      transition:0.3s;
      white-space:nowrap;
    }

    nav a:hover{
      color:#00bcd4;
    }

    /* =========================
       CONTAINER
    ========================== */

    .container{
      max-width:1200px;
      margin:auto;
      padding:60px 20px;
    }

    /* =========================
       CHECKOUT BOX
    ========================== */

    .box{
      background:white;
      max-width:700px;
      margin:auto;
      padding:40px;
      border-radius:24px;
      box-shadow:0 8px 30px rgba(0,0,0,.08);
      animation:fadeIn .3s ease;
      overflow:hidden;
    }

    /* =========================
       TITLE
    ========================== */

    .box h1{
      text-align:center;
      margin-bottom:32px;
      font-size:36px;
      color:#111;
      line-height:1.3;
    }

    /* =========================
       FORM
    ========================== */

    form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    /* =========================
       FORM GROUP
    ========================== */

    .form-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .form-group label{
      font-size:13px;
      color:#777;
      text-transform:uppercase;
      letter-spacing:1px;
      font-weight:bold;
    }

    .form-group input,
    .form-group textarea{
      width:100%;
      padding:15px 16px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:16px;
      outline:none;
      transition:0.3s;
      background:#fafafa;
      color:#111;
    }

    .form-group input:focus,
    .form-group textarea:focus{
      border-color:#00bcd4;
      background:white;
      box-shadow:0 0 0 3px rgba(0,188,212,0.1);
    }

    /* =========================
       TEXTAREA
    ========================== */

    textarea{
      min-height:120px;
      resize:vertical;
    }

    /* =========================
       BUTTON
    ========================== */

    .btn{
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#111;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    .btn:hover{
      background:#00bcd4;
      transform:translateY(-2px);
    }

    /* =========================
       TOAST
    ========================== */

    .toast{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#28a745;
      color:white;
      padding:14px 18px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      font-size:14px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s ease;
      z-index:9999;
      max-width:90%;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    /* =========================
       FOOTER
    ========================== */

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:60px;
    }

    /* =========================
       ANIMATION
    ========================== */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(15px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       TABLET
    ========================== */

    @media(max-width:768px){

      header{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
      }

      .logo{
        font-size:24px;
      }

      nav{
        width:100%;
        justify-content:flex-start;
        gap:14px;
      }

      nav a{
        font-size:15px;
      }

      .container{
        padding:30px 15px;
      }

      .box{
        padding:28px 22px;
        border-radius:20px;
      }

      .box h1{
        font-size:28px;
        margin-bottom:26px;
      }

      .form-group input,
      .form-group textarea{
        font-size:15px;
      }

      .btn{
        font-size:17px;
      }

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:480px){

      header{
        padding:18px 15px;
      }

      nav{
        flex-direction:column;
        align-items:flex-start;
      }

      .container{
        padding:25px 12px;
      }

      .box{
        padding:22px 16px;
        border-radius:18px;
      }

      .box h1{
        font-size:24px;
      }

      .form-group label{
        font-size:12px;
      }

      .form-group input,
      .form-group textarea{
        padding:14px;
        border-radius:10px;
      }

      textarea{
        min-height:100px;
      }

      .btn{
        padding:15px;
        font-size:16px;
      }

      .toast{
        right:10px;
        left:10px;
        bottom:15px;
        max-width:none;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">Nova Store</div>

    <nav>
      <a href="index.html">Начало</a>
      <a href="products.html">Продукти</a>
      <a href="cart.html">Количка</a>
      <a href="track-order.html">Проследяване на поръчка</a>
      <a id="authLink" href="login.html">Вход</a>
    </nav>

  </header>

  <!-- MAIN -->

  <div class="container">

    <div class="box">

      <h1>Завършване на поръчка</h1>

      <form id="checkoutForm">

        <div class="form-group">
          <label>Пълно име</label>
          <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
          <label>Телефон</label>
          <input type="text" id="phone" required>
        </div>

        <div class="form-group">
          <label>WhatsApp</label>
          <input type="text" id="whatsapp" required>
        </div>

        <div class="form-group">
          <label>Държава</label>
          <input type="text" id="country" value="Bulgaria">
        </div>

        <div class="form-group">
          <label>Град</label>
          <input type="text" id="city" required>
        </div>

        <div class="form-group">
          <label>Адрес</label>
          <textarea id="address" required></textarea>
        </div>

        <button class="btn" type="submit">
          Потвърди поръчката
        </button>

      </form>

    </div>

  </div>

  <!-- FOOTER -->

  <footer>
    © 2026 Nova Store. Всички права запазени.
  </footer>

  <!-- TOAST -->

  <div id="toast" class="toast"></div>

  <script type="module">

    import { db, auth } from "./js/firebase-config.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const authLink = document.getElementById("authLink");

    onAuthStateChanged(auth, (user) => {

      if(user){

        authLink.textContent = "Профил";
        authLink.href = "profile.html";

      } else {

        authLink.textContent = "Вход";
        authLink.href = "login.html";

      }

    });

  </script>

  <script type="module" src="js/checkout.js"></script>

</body>
</html>
