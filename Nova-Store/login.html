<!-- login.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
    }

    /* =========================
       LOGIN BOX
    ========================== */

    .box{
      width:100%;
      max-width:420px;
      background:#1e293b;
      padding:40px;
      border-radius:24px;
      box-shadow:0 10px 35px rgba(0,0,0,0.25);
      animation:fadeIn .3s ease;
    }

    /* =========================
       TITLE
    ========================== */

    h1{
      text-align:center;
      margin-bottom:30px;
      font-size:34px;
      color:white;
      line-height:1.3;
    }

    /* =========================
       FORM
    ========================== */

    form{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    /* =========================
       INPUTS
    ========================== */

    input{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#0f172a;
      color:white;
      font-size:16px;
      outline:none;
      transition:0.3s;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus{
      box-shadow:0 0 0 3px rgba(139,92,246,0.25);
      background:#111827;
    }

    /* =========================
       BUTTON
    ========================== */

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:#8b5cf6;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      margin-top:5px;
    }

    button:hover{
      background:#7c3aed;
      transform:translateY(-2px);
    }

    /* =========================
       LINK
    ========================== */

    .link{
      margin-top:22px;
      text-align:center;
      color:#cbd5e1;
      font-size:15px;
      line-height:1.6;
    }

    .link a{
      color:#8b5cf6;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    .link a:hover{
      color:#a78bfa;
    }

    /* =========================
       ANIMATION
    ========================== */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(15px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       TABLET
    ========================== */

    @media(max-width:768px){

      body{
        padding:18px;
      }

      .box{
        padding:32px 24px;
        border-radius:20px;
      }

      h1{
        font-size:30px;
        margin-bottom:26px;
      }

      input{
        padding:15px;
        font-size:15px;
      }

      button{
        font-size:16px;
      }

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:480px){

      body{
        padding:14px;
        align-items:center;
      }

      .box{
        padding:24px 18px;
        border-radius:18px;
      }

      h1{
        font-size:26px;
        margin-bottom:22px;
      }

      input{
        padding:14px;
        border-radius:12px;
      }

      button{
        padding:15px;
        border-radius:12px;
      }

      .link{
        font-size:14px;
      }

    }

  </style>
</head>

<body>

  <div class="box">

    <h1>Вход</h1>

    <form id="loginForm">

      <input
        type="email"
        id="email"
        placeholder="Имейл"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Парола"
        required
      >

      <button type="submit">
        Влез
      </button>

    </form>

    <div class="link">
      Нямаш акаунт?
      <a href="register.html">Регистрация</a>
    </div>

  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
