<!-- product-details.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Детайли за продукта</title>

  <style>

    /* RESET */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f5;
      color:#222;
      overflow-x:hidden;
    }

    img{
      max-width:100%;
      display:block;
    }

    /* =========================
       HEADER
    ========================== */

    header{
      background:#111;
      color:white;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:999;
      gap:20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#00bcd4;
      white-space:nowrap;
    }

    nav{
      display:flex;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:16px;
      transition:0.3s;
      white-space:nowrap;
    }

    nav a:hover{
      color:#00bcd4;
    }

    /* =========================
       CONTAINER
    ========================== */

    .container{
      max-width:1300px;
      margin:auto;
      padding:50px 30px;
      min-height:60vh;
    }

    /* =========================
       PRODUCT DETAILS
    ========================== */

    .product-details{
      background:white;
      border-radius:22px;
      overflow:hidden;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      padding:35px;
      box-shadow:0 6px 25px rgba(0,0,0,.08);
    }

    /* =========================
       GALLERY
    ========================== */

    .details-gallery{
      display:flex;
      gap:15px;
      overflow-x:auto;
      scroll-behavior:smooth;
      scroll-snap-type:x mandatory;
      padding-bottom:10px;
    }

    .details-gallery::-webkit-scrollbar{
      height:8px;
    }

    .details-gallery::-webkit-scrollbar-thumb{
      background:#ccc;
      border-radius:10px;
    }

    .details-image{
      min-width:100%;
      height:520px;
      object-fit:cover;
      border-radius:16px;
      scroll-snap-align:start;
      background:#eee;
    }

    /* =========================
       INFO
    ========================== */

    .details-info{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }

    .details-info h1{
      font-size:42px;
      margin-bottom:20px;
      color:#111;
      line-height:1.2;
      word-break:break-word;
    }

    .price{
      color:#00bcd4;
      font-size:36px;
      font-weight:bold;
      margin-bottom:25px;
    }

    .description{
      font-size:18px;
      line-height:1.8;
      color:#555;
      margin-bottom:35px;
      word-break:break-word;
    }

    /* =========================
       BUTTON
    ========================== */

    .buy-btn{
      width:250px;
      padding:16px;
      border:none;
      background:#111;
      color:white;
      border-radius:12px;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
      font-weight:bold;
    }

    .buy-btn:hover{
      background:#00bcd4;
      transform:translateY(-2px);
    }

    /* =========================
       FOOTER
    ========================== */

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:60px;
    }

    /* =========================
       TABLET
    ========================== */

    @media(max-width:992px){

      .product-details{
        grid-template-columns:1fr;
      }

      .details-image{
        height:420px;
      }

      .details-info h1{
        font-size:34px;
      }

      .price{
        font-size:30px;
      }

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:768px){

      header{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
      }

      .logo{
        font-size:24px;
      }

      nav{
        width:100%;
        justify-content:flex-start;
        gap:14px;
      }

      nav a{
        font-size:15px;
      }

      .container{
        padding:25px 15px;
      }

      .product-details{
        padding:20px;
        border-radius:18px;
        gap:25px;
      }

      .details-image{
        height:320px;
      }

      .details-info h1{
        font-size:26px;
      }

      .price{
        font-size:26px;
      }

      .description{
        font-size:16px;
        margin-bottom:25px;
      }

      .buy-btn{
        width:100%;
      }

    }

    /* =========================
       SMALL MOBILE
    ========================== */

    @media(max-width:480px){

      header{
        padding:18px 15px;
      }

      nav{
        flex-direction:column;
        align-items:flex-start;
      }

      .container{
        padding:20px 12px;
      }

      .product-details{
        padding:16px;
        border-radius:16px;
      }

      .details-image{
        height:260px;
      }

      .details-info h1{
        font-size:22px;
      }

      .price{
        font-size:22px;
      }

      .description{
        font-size:15px;
        line-height:1.6;
      }

    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">Nova Store</div>

    <nav>
      <a href="index.html">Начало</a>
      <a href="products.html">Продукти</a>
      <a href="cart.html">Количка</a>
      <a href="track-order.html">Проследяване на поръчка</a>
      <a id="authLink" href="login.html">Вход</a>
    </nav>

  </header>

  <!-- PRODUCT DETAILS -->
  <div class="container">
    <!-- JS inject content here -->
  </div>

  <!-- FOOTER -->

  <footer>
    ©️ 2026 Nova Store Bulgaria
  </footer>

  <script type="module">

    import { db, auth } from "./js/firebase-config.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const authLink = document.getElementById("authLink");

    onAuthStateChanged(auth, (user) => {

      if(user){
        authLink.textContent = "Профил";
        authLink.href = "profile.html";
      } else {
        authLink.textContent = "Вход";
        authLink.href = "login.html";
      }

    });

  </script>

  <script type="module" src="js/product-details.js"></script>

</body>
</html>
