<!-- product-details.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Детайли за продукта</title>

  <style>

    /* RESET */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
  color:#222;
}


/* HEADER */

header{
  background:#111;
  color:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#00bcd4;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  transition:0.3s;
  font-size:16px;
}

nav a:hover{
  color:#00bcd4;
}


/* CONTAINER */

.container{
  max-width:1300px;
  margin:auto;
  padding:50px 30px;
}


/* PRODUCT DETAILS */

.product-details{
  background:white;
  border-radius:18px;
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  padding:35px;
  box-shadow:0 6px 25px rgba(0,0,0,.08);
}


/* GALLERY */

.details-gallery{
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
  scroll-snap-type:x mandatory;
  padding-bottom:10px;
}

.details-gallery::-webkit-scrollbar{
  height:8px;
}

.details-gallery::-webkit-scrollbar-thumb{
  background:#ccc;
  border-radius:10px;
}

.details-image{
  min-width:100%;
  height:520px;
  object-fit:cover;
  border-radius:14px;
  scroll-snap-align:start;
  background:#eee;
}


/* INFO */

.details-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.details-info h1{
  font-size:42px;
  margin-bottom:20px;
  color:#111;
  line-height:1.2;
}

.price{
  color:#00bcd4;
  font-size:36px;
  font-weight:bold;
  margin-bottom:25px;
}

.description{
  font-size:18px;
  line-height:1.8;
  color:#555;
  margin-bottom:35px;
}


/* BUTTON */

.buy-btn{
  width:250px;
  padding:16px;
  border:none;
  background:#111;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  transition:0.3s;
}

.buy-btn:hover{
  background:#00bcd4;
  transform:translateY(-2px);
}


/* FOOTER */

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:25px;
  margin-top:60px;
}


/* MOBILE */

@media(max-width:992px){

  .product-details{
    grid-template-columns:1fr;
  }

  .details-image{
    height:400px;
  }

  .details-info h1{
    font-size:32px;
  }

}


@media(max-width:768px){

  header{
    flex-direction:column;
    gap:15px;
    padding:20px;
  }

  nav{
    flex-wrap:wrap;
    justify-content:center;
  }

  .container{
    padding:25px 15px;
  }

  .product-details{
    padding:20px;
  }

  .details-image{
    height:300px;
  }

  .details-info h1{
    font-size:26px;
  }

  .price{
    font-size:28px;
  }

  .description{
    font-size:16px;
  }

  .buy-btn{
    width:100%;
  }

}

  </style>
</head>

<body>

  <header>

    <div class="logo">Nova Store</div>

    <nav>

     <a href="index.html">Начало</a>
      <a href="products.html">Продукти</a>
      <a href="cart.html">Количка</a>
            <a href="track-order.html">проследяване на поръчка</a>

      <a id="authLink" href="login.html">Вход</a>


    </nav>

  </header>



  <!-- PRODUCT DETAILS -->
  <div class="container"></div>



  <footer>
    ©️ 2026 Nova Store Bulgaria
  </footer>

 <script type="module">
import { db, auth } from "./js/firebase-config.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



    const authLink = document.getElementById("authLink");

    const container = document.getElementById("products");



    // 🔥 auth state
    onAuthStateChanged(auth, (user) => {

      if(user){

        authLink.textContent = "Профил";

        authLink.href = "profile.html";

      } else {

        authLink.textContent = "Вход";

        authLink.href = "login.html";

      }

    });
    </script>
  <script
    type="module"
    src="js/product-details.js"
  ></script>

</body>
</html>
