<!-- profile.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профил</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#222;
      overflow-x:hidden;
    }

    img{
      max-width:100%;
    }

    /* =========================
       HEADER
    ========================== */

    header{
      background:#111;
      color:white;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      position:sticky;
      top:0;
      z-index:999;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:white;
      white-space:nowrap;
    }

    nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-size:16px;
      transition:0.3s;
    }

    nav a:hover{
      opacity:0.8;
    }

    /* =========================
       CONTAINER
    ========================== */

    .profile-container{
      max-width:1100px;
      margin:40px auto;
      padding:20px;
    }

    .profile-card{
      background:white;
      padding:35px;
      border-radius:22px;
      box-shadow:0 5px 25px rgba(0,0,0,0.1);
    }

    /* =========================
       TOP SECTION
    ========================== */

    .top{
      display:flex;
      align-items:center;
      gap:25px;
    }

    .avatar-box{
      position:relative;
      flex-shrink:0;
    }

    .avatar{
      width:140px;
      height:140px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #111;
    }

    .upload-btn{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      background:#111;
      color:white;
      padding:8px 12px;
      border-radius:20px;
      cursor:pointer;
      font-size:13px;
      white-space:nowrap;
    }

    .top h2{
      font-size:30px;
      word-break:break-word;
    }

    .top p{
      color:gray;
      margin-top:8px;
      word-break:break-word;
    }

    /* =========================
       INFO GRID
    ========================== */

    .info-grid{
      margin-top:35px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .info-box{
      background:#fafafa;
      padding:20px;
      border-radius:18px;
    }

    .info-box span{
      color:gray;
      font-size:14px;
    }

    .info-box h3{
      margin-top:10px;
      word-break:break-word;
    }

    /* =========================
       BUTTONS
    ========================== */

    .actions{
      margin-top:30px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:14px 22px;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    #editBtn{
      background:#111;
      color:white;
    }

    #logoutBtn{
      background:#ff3b30;
      color:white;
    }

    button:hover{
      opacity:0.9;
      transform:translateY(-2px);
    }

    /* =========================
       EDIT BOX
    ========================== */

    .edit-box{
      display:none;
      margin-top:30px;
    }

    .edit-box h2{
      margin-bottom:10px;
    }

    .edit-box input{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:1px solid #ddd;
      border-radius:10px;
      font-size:16px;
      outline:none;
    }

    #saveProfileBtn{
      margin-top:20px;
      width:100%;
      background:#111;
      color:white;
    }

    /* =========================
       ORDERS
    ========================== */

    .orders-section{
      margin-top:40px;
      padding:0 20px;
    }

    .order-card{
      background:white;
      margin-top:15px;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    .order-card h3{
      margin-bottom:10px;
    }

    .order-status{
      color:green;
      font-weight:bold;
    }

    /* =========================
       TABLET
    ========================== */

    @media(max-width:768px){

      header{
        flex-direction:column;
        align-items:flex-start;
        padding:20px;
      }

      nav{
        width:100%;
        justify-content:flex-start;
      }

      .profile-card{
        padding:25px;
      }

      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .avatar{
        width:120px;
        height:120px;
      }

      .top h2{
        font-size:24px;
      }

    }

    /* =========================
       MOBILE
    ========================== */

    @media(max-width:480px){

      .profile-container{
        padding:12px;
        margin:20px auto;
      }

      .profile-card{
        padding:18px;
        border-radius:18px;
      }

      .avatar{
        width:100px;
        height:100px;
      }

      .top h2{
        font-size:20px;
      }

      button{
        width:100%;
      }

      .actions{
        flex-direction:column;
      }

      .edit-box input{
        font-size:15px;
        padding:13px;
      }

    }

  </style>
</head>

<body>

<header>

  <div class="logo">Nova Store</div>

  <nav>
    <a href="index.html">Начало</a>
    <a href="products.html">Продукти</a>
    <a href="cart.html">Количка</a>
    <a href="track-order.html">Проследяване</a>
  </nav>

</header>

<div class="profile-container">

  <div class="profile-card">

    <div class="top">

      <div class="avatar-box">

        <img src="https://i.imgur.com/HeIi0wU.png" id="avatar" class="avatar">

        <label class="upload-btn">
          Смени снимка
          <input type="file" id="avatarInput" hidden>
        </label>

      </div>

      <div>
        <h2 id="name">Loading...</h2>
        <p id="email"></p>
      </div>

    </div>

    <div class="info-grid">

      <div class="info-box">
        <span>Телефон</span>
        <h3 id="phone">-</h3>
      </div>

      <div class="info-box">
        <span>Статус</span>
        <h3>Клиент</h3>
      </div>

    </div>

    <div class="actions">

      <button id="editBtn">Редактирай профил</button>
      <button id="logoutBtn">Изход</button>

    </div>

    <div class="edit-box" id="editBox">

      <h2>Редактиране</h2>

      <input type="text" id="editName" placeholder="Име">
      <input type="text" id="editPhone" placeholder="Телефон">

      <button id="saveProfileBtn">Запази</button>

    </div>

  </div>

</div>

<div class="orders-section">

  <h2>Моите поръчки</h2>
  <div id="ordersList"></div>

</div>

<script type="module" src="./js/profile.js"></script>

</body>
</html>
