<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .box{
      background:#1e293b;
      padding:40px;
      border-radius:20px;
      width:420px;
      max-width:100%;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:28px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
      outline:none;
      font-size:15px;
    }

    input:focus{
      border:1px solid #8b5cf6;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      margin-top:5px;
    }

    button:hover{
      background:#7c3aed;
      transform:translateY(-2px);
    }

    .link{
      margin-top:15px;
      text-align:center;
      color:#cbd5e1;
      font-size:14px;
    }

    .link a{
      color:#8b5cf6;
      text-decoration:none;
    }

    .link a:hover{
      text-decoration:underline;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px){

      .box{
        padding:25px 20px;
        border-radius:16px;
      }

      h1{
        font-size:24px;
      }

      input{
        padding:13px;
        font-size:14px;
      }

      button{
        font-size:15px;
      }
    }

    /* 📱 SMALL PHONES */
    @media (max-width: 400px){

      h1{
        font-size:22px;
      }

      .box{
        padding:20px 15px;
      }
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Регистрация</h1>

    <form id="registerForm">

      <input type="text" id="fullName" placeholder="Име и фамилия" required>

      <input type="email" id="email" placeholder="Имейл" required>

      <input type="password" id="password" placeholder="Парола" required>

      <input type="text" id="phone" placeholder="Телефон" required>

      <button type="submit">Създай акаунт</button>

    </form>

    <div class="link">
      Вече имаш акаунт? <a href="login.html">Вход</a>
    </div>

  </div>

  <script type="module">
    import { auth, db } from "./js/firebase-config.js";

    import {
      createUserWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


    document.getElementById("registerForm")
    .addEventListener("submit", async (e) => {

      e.preventDefault();

      const fullName = document.getElementById("fullName").value;
      const phone = document.getElementById("phone").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {

        const userCredential =
          await createUserWithEmailAndPassword(auth, email, password);

        const user = userCredential.user;

        await updateProfile(user,{
          displayName: fullName
        });

        await setDoc(doc(db,"users",user.uid),{
          fullName,
          phone,
          email,
          photoURL:"https://i.imgur.com/HeIi0wU.png",
          createdAt: new Date()
        });

        alert("Регистрацията е успешна");

        window.location.href = "profile.html";

      } catch(error){
        alert(error.message);
      }

    });
  </script>

</body>
</html>
