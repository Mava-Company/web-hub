<!-- register.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#1e293b;
      padding:40px;
      border-radius:20px;
      width:420px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:15px;
      border:none;
      border-radius:12px;
      background:#0f172a;
      color:white;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#8b5cf6;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#7c3aed;
    }

    .link{
      margin-top:15px;
      text-align:center;
      color:#cbd5e1;
    }

    .link a{
      color:#8b5cf6;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Регистрация</h1>

    <form id="registerForm">

      <input type="text" id="fullName" placeholder="Име и фамилия" required>

      <input type="email" id="email" placeholder="Имейл" required>

      <input type="password" id="password" placeholder="Парола" required>

      <input type="text" id="phone" placeholder="Телефон" required>

      <button type="submit">Създай акаунт</button>

    </form>

    <div class="link">
      Вече имаш акаунт? <a href="login.html">Вход</a>
    </div>

  </div>

  <script type="module">
   import { auth, db } from "./js/firebase-config.js";

import {
  createUserWithEmailAndPassword,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


document.getElementById("registerForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const fullName = document.getElementById("fullName").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    const user = userCredential.user;

    // تحديث الاسم داخل auth
    await updateProfile(user,{
      displayName: fullName
    });

    // حفظ البيانات داخل firestore
    await setDoc(doc(db,"users",user.uid),{

      fullName,
      phone,
      email,
      photoURL:"https://i.imgur.com/HeIi0wU.png",
      createdAt: new Date()
      

    });

    alert("Регистрацията е успешна");

    window.location.href = "profile.html";

  } catch(error){

    alert(error.message);

  }

});
  </script>

</body>
</html>
