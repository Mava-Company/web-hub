<!-- track-order.html -->
<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проследяване на поръчка</title>

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
  color:#222;
}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:28px;
  font-weight:bold;
  color:#00bcd4;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:16px;
}

nav a:hover{
  color:#00bcd4;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
}

.container h1{
  font-size:36px;
  margin-bottom:30px;
  color:#111;
}

/* BOX */
.box{
  background:white;
  padding:40px;
  border-radius:22px;
  box-shadow:0 8px 30px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  gap:18px;
  align-items:center;
}

/* INPUT */
.box input{
  width:100%;
  max-width:420px;
  padding:14px 16px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  text-align:center;
  outline:none;
  transition:0.3s;
}

.box input:focus{
  border-color:#00bcd4;
  background:#fff;
}

/* BUTTON */
.box button{
  width:100%;
  max-width:220px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

.box button:hover{
  background:#00bcd4;
  transform:translateY(-2px);
}

/* RESULT */
.result{
  width:100%;
  margin-top:10px;
  padding:18px;
  border-radius:14px;
  background:#f7f7f7;
  text-align:left;
  min-height:60px;
  font-size:15px;
  color:#333;
}

/* STATUS */
.status{
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  font-size:14px;
  margin-top:10px;
}

.status.Pending{ background:#ffcc00; color:#111; }
.status.Shipped{ background:#2196f3; color:white; }
.status.Delivered{ background:#4caf50; color:white; }
.status.Cancelled{ background:#f44336; color:white; }

/* 📱 MOBILE */
@media (max-width: 768px){

  header{
    flex-direction:column;
    gap:12px;
    padding:18px;
    text-align:center;
  }

  nav{
    flex-wrap:wrap;
    justify-content:center;
  }

  .container{
    padding:40px 15px;
  }

  .container h1{
    font-size:26px;
  }

  .box{
    padding:25px 15px;
    border-radius:16px;
  }

  .box input{
    font-size:14px;
  }

  .box button{
    width:100%;
    max-width:100%;
  }
}

/* SMALL PHONES */
@media (max-width: 400px){

  .container h1{
    font-size:22px;
  }

  .box{
    padding:20px 12px;
  }
}

  </style>
</head>

<body>

<header>
  <div class="logo">Nova Store</div>

  <nav>
    <a href="index.html">Начало</a>
    <a href="products.html">Продукти</a>
    <a href="cart.html">Количка</a>
    <a href="track-order.html">проследяване на поръчка</a>
    <a id="authLink" href="login.html">Вход</a>
  </nav>
</header>

<div class="container">

  <h1>Проследяване на поръчка</h1>

  <div class="box">

    <input type="text" id="orderId" placeholder="Въведете код на поръчката">

    <button id="trackBtn">Провери</button>

    <div class="result"></div>

  </div>

</div>

<script type="module">
import { auth } from "./js/firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const authLink = document.getElementById("authLink");

onAuthStateChanged(auth, (user) => {
  if(user){
    authLink.textContent = "Профил";
    authLink.href = "profile.html";
  } else {
    authLink.textContent = "Вход";
    authLink.href = "login.html";
  }
});
</script>

<script type="module" src="js/track-order.js"></script>

</body>
</html>
