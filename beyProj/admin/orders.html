<!-- admin/orders.html -->

<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поръчки</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
      display:flex;
    }

    .sidebar{
      width:280px;
      height:100vh;
      background:#111827;
      padding:30px;
      position:fixed;
      left:0;
      top:0;
    }

    .logo{
      font-size:30px;
      color:#8b5cf6;
      font-weight:bold;
      margin-bottom:50px;
    }

    .sidebar a{
      display:block;
      color:white;
      text-decoration:none;
      padding:15px;
      margin-bottom:10px;
      border-radius:12px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1e293b;
    }

    .main{
      margin-left:280px;
      width:100%;
      padding:40px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
    }

    .topbar h1{
      font-size:40px;
    }

    .orders-container{
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .order-card{
      background:#1e293b;
      border-radius:20px;
      padding:30px;
    }

    .order-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .order-id{
      font-size:24px;
      color:#8b5cf6;
    }

    .status{
      padding:10px 18px;
      border-radius:12px;
      font-size:14px;
    }

    .pending{
      background:#f59e0b;
    }

    .processing{
      background:#3b82f6;
    }

    .delivered{
      background:#22c55e;
    }

    .order-details{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .detail-box{
      background:#0f172a;
      padding:20px;
      border-radius:15px;
    }

    .detail-box h3{
      margin-bottom:15px;
      color:#94a3b8;
      font-size:16px;
    }

    .detail-box p{
      margin-bottom:10px;
      color:#e2e8f0;
    }

    .products{
      margin-top:20px;
    }

    .products h3{
      margin-bottom:20px;
    }

    .product{
      display:flex;
      align-items:center;
      gap:20px;
      background:#0f172a;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
    }

    .product img{
      width:80px;
      height:80px;
      border-radius:12px;
      object-fit:cover;
    }

    .product-info{
      flex:1;
    }

    .actions{
      margin-top:25px;
      display:flex;
      gap:15px;
    }

    .actions button{
      border:none;
      padding:12px 20px;
      border-radius:12px;
      color:white;
      cursor:pointer;
    }

    .confirm-btn{
      background:#22c55e;
    }

    .process-btn{
      background:#3b82f6;
    }

    .cancel-btn{
      background:#ef4444;
    }

  </style>
</head>

<body>

<div class="sidebar">

  <div class="logo">Admin</div>

  <a href="dashboard.html">Контролен панел</a>
  <a href="add-product.html">Добави продукт</a>
  <a href="products.html">Продукти</a>
  <a href="orders.html">Поръчки</a>
  <a href="users.html">Потребители</a>

</div>

<div class="main">

  <div class="topbar">
    <h1>Поръчки</h1>
  </div>

  <div class="orders-container" id="ordersContainer"></div>


</div>
<script type="module" src="../js/admin-orders.js"></script>
</body>
</html>
